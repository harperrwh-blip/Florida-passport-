  { id:89, lat:30.4760, lng:-84.2240, name:"Tallahassee-St. Marks Historic Railroad State Trail", region:"Panhandle", county:"Leon/Wakulla", emoji:"🚂", color:"#4a6741", fact:"Florida's first rail-trail, following the 1837 Tallahassee-to-St. Marks railroad corridor.", facts:[{icon:"🚂",text:"The railroad was built in 1837 to carry cotton from Tallahassee's plantations to St. Marks."},{icon:"🚴",text:"The 20-mile paved trail is popular for cycling, running, and inline skating."},{icon:"🌿",text:"The trail corridor passes through beautiful longleaf pine flatwoods and titi swamps."},{icon:"🐦",text:"Red-cockaded woodpeckers — federally endangered — nest in old-growth pines along the trail."}]},
  { id:90, lat:30.3764, lng:-86.2326, name:"Topsail Hill Preserve State Park", region:"Panhandle", county:"Walton", emoji:"🏖️", color:"#2d8aaa", fact:"Three pristine coastal dune lakes and 3.2 miles of undeveloped Emerald Coast beach — one of Florida's most spectacular parks.", facts:[{icon:"🌊",text:"Protects three of Florida's rare coastal dune lakes — a globally unique ecosystem."},{icon:"🏖️",text:"The beach is accessed by tram through the dunes — no roads touch the shoreline."},{icon:"🌿",text:"Towering sand dunes up to 25 feet tall line the coast, formed by Gulf winds over thousands of years."},{icon:"🐢",text:"The undisturbed beach supports significant loggerhead sea turtle nesting."}]},
  { id:91, lat:29.0851, lng:-81.0520, name:"Tomoka State Park", region:"Northeast Florida", county:"Volusia", emoji:"🌿", color:"#4a6741", fact:"An ancient Timucuan village site on the beautiful Tomoka River, with Spanish moss hammocks and exceptional kayaking.", facts:[{icon:"🏛️",text:"The Timucuan village of Nocoroco stood here, visited by Spanish explorers as early as 1605."},{icon:"🛶",text:"The Tomoka River is one of Florida's finest paddling streams through ancient cypress and hammock."},{icon:"🌿",text:"A statue of Chief Tomokie marks the park — a monument to the Timucuan people."},{icon:"🦅",text:"Bald eagles nest in the park, and roseate spoonbills forage in the tidal marsh."}]},
  { id:92, lat:27.5400, lng:-82.4560, name:"Wekiwa Springs State Park", region:"Central Florida", county:"Orange/Seminole", emoji:"💧", color:"#1a7a6a", fact:"A crystal-clear spring and Wild and Scenic river corridor just 20 minutes from downtown Orlando.", facts:[{icon:"💧",text:"Wekiwa Spring forms the headwaters of the Wekiva River, a federally designated Wild and Scenic River."},{icon:"🌿",text:"Part of the Wekiva-Ocala Greenway, a vital wildlife corridor to Ocala National Forest."},{icon:"🤿",text:"The spring head is a popular swimming hole with crystal-clear 68°F water."},{icon:"🐊",text:"Florida black bears, river otters, and alligators all inhabit the park and its wildlife corridor."}]},
  { id:93, lat:28.5800, lng:-82.6460, name:"Werner-Boyce Salt Springs State Park", region:"Nature Coast", county:"Pasco", emoji:"💧", color:"#2d6e8a", fact:"A unique first-magnitude spring where fresh and salt water mix, creating a one-of-a-kind habitat.", facts:[{icon:"💧",text:"Salt Springs is unusual — a first-magnitude spring where fresh spring water mixes with rising salt water."},{icon:"🐟",text:"The unique salt-fresh mix supports both freshwater and saltwater fish in the same spring pool."},{icon:"🌿",text:"Surrounding tidal marsh and estuary protect critical spawning habitat for Gulf Coast gamefish."},{icon:"🛶",text:"A water trail through the estuary to the Gulf is one of the least-known best paddles on the Nature Coast."}]},
  { id:94, lat:24.9380, lng:-80.6049, name:"Windley Key Fossil Reef Geological State Park", region:"Florida Keys", county:"Monroe", emoji:"🪸", color:"#2d6e8a", fact:"A former quarry revealing 125,000-year-old fossil coral reef in ancient exposed limestone cuts.", facts:[{icon:"🪸",text:"Exposed quarry walls show beautiful cross-sections of the Key Largo Limestone — a fossilized coral reef."},{icon:"🚂",text:"The quarry was mined in the early 1900s to provide building material for Flagler's Overseas Railroad."},{icon:"🌿",text:"Tropical hammock has grown over the old quarry walls, creating a striking natural-industrial landscape."},{icon:"🔬",text:"A National Natural Landmark and world-class outdoor geology classroom."}]},
  { id:95, lat:29.3560, lng:-82.9680, name:"Withlacoochee Gulf Preserve", region:"Nature Coast", county:"Citrus/Hernando", emoji:"🌊", color:"#2d6e8a", fact:"A remote coastal preserve protecting salt marsh and tidal creeks where the Withlacoochee meets the Gulf.", facts:[{icon:"🌊",text:"Protects the estuary where the Withlacoochee River flows into the Gulf of Mexico."},{icon:"🦩",text:"One of the most productive wading bird foraging areas on Florida's entire Nature Coast."},{icon:"🎣",text:"Tidal creeks and grass flats support excellent fishing for redfish and speckled trout."},{icon:"🐊",text:"American alligators and crocodiles are both found in the preserve's brackish estuary."}]},
  { id:96, lat:29.7690, lng:-82.4700, name:"Ybor City Museum State Park", region:"Central West Florida", county:"Hillsborough", emoji:"🏛️", color:"#7a5020", fact:"Preserves the history of Tampa's neighborhood that was once the 'Cigar Capital of the World.'", facts:[{icon:"🚬",text:"At its peak, Ybor City's factories produced over 500 million hand-rolled cigars per year."},{icon:"🌍",text:"Cuban, Spanish, and Italian immigrants built Ybor City's unique multi-ethnic community in the late 1800s."},{icon:"🏛️",text:"The museum occupies a restored 1923 bakery building surrounded by restored workers' casitas."},{icon:"🎭",text:"José Martí, Cuba's independence hero, organized Cuban exiles here during multiple visits."}]},
  { id:97, lat:28.8470, lng:-82.5800, name:"Yulee Sugar Mill Ruins Historic State Park", region:"Nature Coast", county:"Citrus", emoji:"⚙️", color:"#7a5020", fact:"Remarkably preserved ruins of an 1851 sugar mill built by Florida's first US Senator, David Levy Yulee.", facts:[{icon:"⚙️",text:"The massive iron gears and boilers of the 1851 mill are still largely intact."},{icon:"🏛️",text:"David Levy Yulee, Florida's first US Senator, built the mill on a 5,100-acre plantation."},{icon:"⚔️",text:"Union cavalry raided and burned the mill in 1864 — it was never rebuilt."},{icon:"🌿",text:"Ancient live oaks now grow through and around the ruins."}]},
  { id:98, lat:27.9881, lng:-80.5404, name:"Archie Carr NWR / Brevard Sea Turtle Beach", region:"Central East Florida", county:"Brevard/Indian River", emoji:"🐢", color:"#2d7a3a", fact:"The most important sea turtle nesting beach in the Western Hemisphere.", facts:[{icon:"🐢",text:"The largest concentration of loggerhead sea turtle nesting in the Western Hemisphere."},{icon:"🌊",text:"Over 15,000 sea turtle nests are recorded here in peak years."},{icon:"🌿",text:"Flanked by Indian River Lagoon — one of the most biodiverse estuaries in North America."},{icon:"🔬",text:"Sea turtle research conducted here has shaped global conservation policy for 40+ years."}]},
  { id:99, lat:28.4300, lng:-80.6030, name:"Canaveral National Seashore", region:"Central East Florida", county:"Brevard/Volusia", emoji:"🚀", color:"#2d6e8a", fact:"The longest stretch of undeveloped Atlantic beach in Florida, adjacent to Kennedy Space Center.", facts:[{icon:"🚀",text:"The seashore and Kennedy Space Center sit side by side — rocket launches are visible from the beach."},{icon:"🐢",text:"Playalinda Beach is one of the premier sea turtle nesting beaches on the East Coast."},{icon:"🌿",text:"Mosquito Lagoon is one of Florida's most productive Indian River Lagoon segments."},{icon:"🏛️",text:"Ancient Timucuan shell middens and mounds are preserved along the lagoon's western shore."}]},
  { id:100, lat:24.6270, lng:-82.8726, name:"Dry Tortugas National Park", region:"Florida Keys", county:"Monroe", emoji:"🏰", color:"#2d8aaa", fact:"A remote island fortress 70 miles west of Key West — accessible only by boat or seaplane.", facts:[{icon:"🏰",text:"Fort Jefferson, the largest masonry structure in the Americas, is still largely intact."},{icon:"🐠",text:"The surrounding reefs are among the most pristine in the Atlantic — excellent snorkeling."},{icon:"🦅",text:"The park hosts the largest sooty tern colony in North America — over 100,000 birds each spring."},{icon:"⛵",text:"Accessible only by ferry or seaplane from Key West — a truly remote experience."}]},
  { id:101, lat:28.9450, lng:-82.3210, name:"Manatee Springs State Park", region:"North Florida", county:"Gilchrist", emoji:"🦭", color:"#3a8070", fact:"Crystal-clear first-magnitude spring pumping 117 million gallons daily into the Suwannee River.", facts:[{icon:"🌡️",text:"Spring water stays at a constant 68°F, attracting West Indian manatees in winter."},{icon:"🤿",text:"One of Florida's premier scuba diving sites with visibility exceeding 100 feet."},{icon:"🌿",text:"A magnificent bald cypress boardwalk winds through ancient swamp to the spring head."},{icon:"🦅",text:"Osprey and limpkin are frequently spotted hunting along the Suwannee River here."}]},
  { id:102, lat:29.6630, lng:-85.3840, name:"Dr. Julian G. Bruce St. George Island State Park", region:"Panhandle", county:"Franklin", emoji:"🦅", color:"#e8c870", fact:"Nine miles of undeveloped beach on one of Florida's last wild barrier islands, with exceptional birding.", facts:[{icon:"🦅",text:"A premier birding site for fall migration — sharp-shinned hawks, merlins, and peregrine falcons funnel through."},{icon:"🐚",text:"Among the best shelling spots in the Florida Panhandle, especially after winter storms."},{icon:"🏕️",text:"Primitive camping on the undeveloped eastern end offers one of Florida's most remote beach experiences."},{icon:"🐢",text:"Loggerhead sea turtles nest on the park's beaches each summer."}]},
  { id:103, lat:27.5260, lng:-81.7650, name:"Paynes Creek Historic State Park", region:"Central Florida", county:"Hardee", emoji:"⚔️", color:"#7a5020", fact:"Site of an 1849 Seminole War-era trading post massacre that triggered the Third Seminole War.", facts:[{icon:"⚔️",text:"Two Indian agent traders were killed at the trading post here in April 1849, triggering the Third Seminole War."},{icon:"🌊",text:"Paynes Creek flows through a beautiful river hammock into the Peace River."},{icon:"🌿",text:"Floodplain forest along the creek is rich in magnolia, laurel oak, and swamp tupelo."},{icon:"🐢",text:"American alligators and Florida softshell turtles are abundant along the creek."}]},
  { id:104, lat:29.5830, lng:-82.9870, name:"Paynes Prairie Preserve State Park", region:"North Central Florida", county:"Alachua", emoji:"🦬", color:"#6b7a2a", fact:"A vast wet prairie basin where wild bison and horses roam — Florida's original 'cattle country.'", facts:[{icon:"🦬",text:"A herd of American bison and a band of wild Spanish horses roam freely on the prairie."},{icon:"🦩",text:"One of the most important sandhill crane wintering grounds in eastern North America."},{icon:"🐊",text:"Thousands of American alligators inhabit the prairie — one of the densest populations in the state."},{icon:"🏛️",text:"The basin was once a vast lake that drained overnight in 1891 when a sinkhole opened."}]},
  { id:105, lat:30.7340, lng:-85.9270, name:"Ponce De Leon Springs State Park", region:"Panhandle", county:"Holmes", emoji:"💧", color:"#1a7a6a", fact:"Two crystal-clear spring pools in Holmes County, among Florida's most pristine swimming holes.", facts:[{icon:"💧",text:"Two springs pump 14 million gallons of 68°F water per day."},{icon:"🤿",text:"The clear water and sandy spring floors make this an ideal swimming and snorkeling spot."},{icon:"🌿",text:"A short nature trail through floodplain forest connects the two spring pools."},{icon:"🦅",text:"Barred owls, pileated woodpeckers, and wood ducks inhabit the surrounding river swamp."}]},
  { id:106, lat:27.2860, lng:-82.4350, name:"Oscar Scherer State Park", region:"Southwest Florida", county:"Sarasota", emoji:"🦜", color:"#4a6741", fact:"One of the most important Florida scrub-jay refuges in the state, minutes from Sarasota.", facts:[{icon:"🦜",text:"One of the most significant and closely monitored Florida scrub-jay populations in the US."},{icon:"🌊",text:"South Creek provides a paddling trail through tidal salt marsh to Roberts Bay."},{icon:"🌿",text:"Prescribed burns actively maintain the scrub habitat the scrub-jay requires."},{icon:"🎣",text:"The creek's tidal reaches offer good fishing for snook, redfish, and mangrove snapper."}]},
  { id:107, lat:27.5100, lng:-81.4750, name:"Highlands Hammock State Park", region:"Central Florida", county:"Highlands", emoji:"🌿", color:"#2d6a2a", fact:"One of Florida's original four state parks (1931), protecting ancient cypress trees and rare Florida scrub.", facts:[{icon:"🌿",text:"One of the first four state parks opened in Florida in 1931 — a CCC project."},{icon:"🐊",text:"The park's ancient cypress swamp is one of the finest examples of this vanishing habitat."},{icon:"🌲",text:"Some of the ancient oaks and cypresses are estimated to be over 1,000 years old."},{icon:"🐎",text:"Tram tours through the hammock are offered on weekends."}]},
  { id:108, lat:29.6430, lng:-84.3730, name:"Ochlockonee River State Park", region:"Panhandle", county:"Wakulla", emoji:"🛶", color:"#4a6741", fact:"Where the Ochlockonee River meets the Gulf, excellent for fishing and paddling through coastal pine flatwoods.", facts:[{icon:"🎣",text:"The Ochlockonee River and tidal reaches offer exceptional fishing for redfish and speckled trout."},{icon:"🛶",text:"Canoe trails wind through the river and backwater sloughs through flatwood scenery."},{icon:"🦅",text:"Bald eagle pairs nest in the park's tall longleaf pines overlooking the river."},{icon:"🌿",text:"The park preserves excellent Gulf coastal flatwoods — longleaf pine and wiregrass ecosystem."}]},
  { id:109, lat:25.9140, lng:-80.1524, name:"Oleta River State Park", region:"Southeast Florida", county:"Miami-Dade", emoji:"🚴", color:"#2d7a3a", fact:"The largest urban park in Florida, with mountain biking, paddling, and Miami's largest mangrove canopy.", facts:[{icon:"🚴",text:"Over 10 miles of mountain bike trails — one of South Florida's most popular off-road cycling destinations."},{icon:"🛶",text:"A canoe and kayak launch accesses Oleta River and Biscayne Bay through the mangrove tunnel."},{icon:"🌿",text:"Protects the largest stand of mangrove forest remaining in Miami-Dade County."},{icon:"🏖️",text:"A small Biscayne Bay beach offers swimming right in the heart of Miami."}]},
  { id:110, lat:30.2218, lng:-82.4328, name:"Olustee Battlefield Historic State Park", region:"North Central Florida", county:"Baker", emoji:"⚔️", color:"#7a5020", fact:"Site of the largest Civil War battle fought in Florida on February 20, 1864.", facts:[{icon:"⚔️",text:"Confederate forces defeated Union troops here, preventing a Union takeover of Florida."},{icon:"📜",text:"Three US Colored Troops regiments fought at Olustee."},{icon:"🌲",text:"Sits within the Osceola National Forest, surrounded by longleaf pine flatwoods."},{icon:"🎖️",text:"Annual reenactment each February is one of the largest Civil War reenactments in the Southeast."}]},
  { id:111, lat:28.5800, lng:-82.5700, name:"Little Manatee River State Park", region:"Central West Florida", county:"Hillsborough", emoji:"🛶", color:"#4a6741", fact:"One of Tampa Bay's finest paddling destinations along the blackwater Little Manatee River.", facts:[{icon:"🛶",text:"The 5.7-mile canoe trail winds through pristine swamp and hammock."},{icon:"🌿",text:"The river corridor is remarkably pristine given its proximity to the Tampa Bay metro area."},{icon:"🐎",text:"Equestrian trails loop through pine flatwoods — a popular horse camping spot."},{icon:"🦦",text:"River otters, alligators, and softshell turtles are commonly spotted from the water trail."}]},
  { id:112, lat:30.5180, lng:-81.5040, name:"Little Talbot Island State Park", region:"Northeast Florida", county:"Nassau/Duval", emoji:"🏄", color:"#6b8f5e", fact:"Five miles of undeveloped Atlantic beach with coastal dunes, tidal creeks, and rich wildlife.", facts:[{icon:"🌊",text:"Pristine Atlantic beach and interior tidal marshes connected by nature trails."},{icon:"🦊",text:"River otters and gopher tortoises are commonly spotted on the hiking trails."},{icon:"🌅",text:"Stunning sunrise views directly over the Atlantic Ocean."},{icon:"🏕️",text:"Limited campsite availability makes it feel like a true backcountry escape."}]},
  { id:113, lat:24.8120, lng:-80.8040, name:"Long Key State Park", region:"Florida Keys", county:"Monroe", emoji:"🌊", color:"#2d8aaa", fact:"A classic Keys park with ocean views on both sides, excellent bonefishing flats, and beautiful nature trail.", facts:[{icon:"🎣",text:"The grass flats on Florida Bay side are prime bonefishing territory — a world-class light tackle fishery."},{icon:"🛶",text:"A canoe trail through the mangroves along Florida Bay offers close encounters with herons."},{icon:"🌊",text:"Views from the campground extend over both the Atlantic Ocean and Florida Bay simultaneously."},{icon:"🌿",text:"The Golden Orb Trail weaves through a remarkable variety of Keys plant communities."}]},
  { id:114, lat:26.4060, lng:-81.8590, name:"Lovers Key State Park", region:"Southwest Florida", county:"Lee", emoji:"🌅", color:"#c4703a", fact:"A romantic island park near Fort Myers Beach with one of Southwest Florida's best beaches.", facts:[{icon:"🌅",text:"Voted one of the top beaches in the US for its uncrowded, natural setting."},{icon:"🌿",text:"Encompasses four islands connected by a tram ride through mangrove and coastal hammock."},{icon:"🦅",text:"Bald eagles, ospreys, and roseate spoonbills are regularly seen from the trails and beach."},{icon:"🐬",text:"Bottlenose dolphins frequently hunt in the shallow passes between the islands."}]},
  { id:115, lat:29.3730, lng:-83.1490, name:"Fanning Springs State Park", region:"Nature Coast", county:"Gilchrist", emoji:"💧", color:"#1a7a6a", fact:"A crystal-clear first-magnitude spring on the Suwannee River beloved for swimming.", facts:[{icon:"💧",text:"The spring discharges 65 million gallons of 68°F water per day into the Suwannee River."},{icon:"🤿",text:"Crystal-clear spring run with excellent visibility to the limestone bottom."},{icon:"🦭",text:"Manatees frequently move into the spring run during cold winter weather."},{icon:"🌿",text:"A nature trail winds along the Suwannee River through gorgeous river swamp."}]},
  { id:116, lat:29.9040, lng:-81.3290, name:"Stephen Foster Folk Culture Center State Park", region:"North Florida", county:"Hamilton", emoji:"🎵", color:"#7a5020", fact:"On the Suwannee River — Florida's musical heritage park celebrating folk culture.", facts:[{icon:"🎵",text:"Dedicated to Stephen Foster, who wrote 'Old Folks at Home' in 1851."},{icon:"🎶",text:"A 97-bell carillon tower plays Foster's melodies every 15 minutes."},{icon:"🏛️",text:"The Florida Folk Festival is held here each Memorial Day weekend — one of the oldest folk festivals in the US."},{icon:"🌊",text:"The park sits on a beautiful bend of the Suwannee River with riverside camping."}]},
  { id:117, lat:30.3944, lng:-83.1628, name:"Suwannee River State Park", region:"North Florida", county:"Suwannee", emoji:"🛶", color:"#4a7fa5", fact:"Where the Withlacoochee and Suwannee rivers meet, immortalized by the folk song 'Old Folks at Home.'", facts:[{icon:"🎵",text:"The Suwannee River is Florida's state song river, mentioned in Stephen Foster's iconic 1851 song."},{icon:"💧",text:"Spring-fed waters keep the river at a constant 68°F year-round."},{icon:"🏛️",text:"Civil War-era earthworks are still visible along the river bank."},{icon:"🐊",text:"Home to Florida cooter turtles, American alligators, and the rare Suwannee cooter."}]},
  { id:118, lat:29.3440, lng:-82.4420, name:"Three Rivers State Park", region:"Panhandle", county:"Jackson", emoji:"🌊", color:"#4a6741", fact:"A serene park where the Apalachicola, Chattahoochee, and Flint rivers converge in Northwest Florida.", facts:[{icon:"🌊",text:"Lake Seminole at the confluence of three rivers is one of Northwest Florida's best bass fisheries."},{icon:"🌿",text:"Beech-magnolia ravine forest along the bluffs is among the most scenic and botanically diverse in Florida."},{icon:"🦅",text:"Bald eagles nest along the shoreline and ospreys are commonly seen diving for fish."},{icon:"🏕️",text:"The campground overlooks the lake — one of the most peaceful camping experiences in the Panhandle."}]},
  { id:119, lat:30.5583, lng:-84.9517, name:"Torreya State Park", region:"Panhandle", county:"Liberty", emoji:"🌲", color:"#2d4a20", fact:"Protects the nearly-extinct Florida torreya tree and the dramatic ravines of the Apalachicola Bluffs.", facts:[{icon:"🌲",text:"The Florida torreya tree grows only in this region — fewer than 1,000 individuals remain in the wild."},{icon:"🌿",text:"The Apalachicola Bluffs support plant communities found nowhere else in Florida."},{icon:"🏰",text:"The Gregory House (1849) is a restored antebellum plantation home moved here for preservation."},{icon:"🌊",text:"The Apalachicola River below the bluffs has more endemic species than any river basin in North America."}]},
  { id:120, lat:28.6840, lng:-81.9350, name:"Lake Louisa State Park (Clermont Unit)", region:"Central Florida", county:"Lake", emoji:"🌊", color:"#4a7fa5", fact:"Part of the chain of 13 spring-fed lakes in the heart of the Green Swamp.", facts:[{icon:"🌊",text:"Encompasses 13 spring-fed lakes connected by the Palatlakaha River."},{icon:"🛶",text:"Paddling between the lakes through cypress swamps is one of Central Florida's most rewarding water trails."},{icon:"🐎",text:"Extensive equestrian trail system loops through the park's flatwoods and scrub."},{icon:"🌿",text:"The park lies within the Green Swamp, a critical water recharge area for Central Florida."}]},
  { id:121, lat:28.9270, lng:-82.5740, name:"Crystal River Archaeological State Park", region:"Nature Coast", county:"Citrus", emoji:"🏛️", color:"#7a5020", fact:"One of Florida's most significant pre-Columbian archaeological sites — a ceremonial mound complex used for 1,600 years.", facts:[{icon:"🏛️",text:"The Crystal River mound complex was used by at least six separate Native American cultures over 1,600 years."},{icon:"🌿",text:"The site includes burial mounds, a temple mound, and shell middens across a 14-acre complex."},{icon:"🌊",text:"The park's location on Kings Bay means manatees are regularly visible from the mound tops."},{icon:"🔬",text:"Artifacts span from 200 BC to 1400 AD, representing multiple distinct cultural traditions."}]},
  { id:122, lat:27.9760, lng:-80.9040, name:"Lake Kissimmee State Park (Fishing Unit)", region:"Central Florida", county:"Polk", emoji:"🎣", color:"#6b7a2a", fact:"The Lake Kissimmee fishing area — world-class largemouth bass fishing on one of Florida's largest lakes.", facts:[{icon:"🎣",text:"Lake Kissimmee is consistently ranked among the top largemouth bass fishing lakes in the US."},{icon:"🦅",text:"Bald eagles and ospreys fish the lake's open water throughout the year."},{icon:"🌾",text:"Surrounding dry prairie and wetlands support breeding sandhill cranes and wood storks."},{icon:"🛶",text:"Lake access for paddling through the adjacent marsh system and smaller connected lakes."}]},
  { id:123, lat:24.6600, lng:-81.5100, name:"Bahia Honda (Bay Side)", region:"Florida Keys", county:"Monroe", emoji:"🐠", color:"#1a8080", fact:"The bay side of Bahia Honda State Park offers kayaking, fishing, and views of the historic railroad bridge.", facts:[{icon:"🐠",text:"Florida Bay side offers excellent snorkeling in shallow clear water over seagrass beds."},{icon:"🛶",text:"Kayak rentals are available for exploring the mangrove shoreline of Little Pine Key."},{icon:"🦅",text:"Magnificent frigatebirds and brown pelicans are commonly seen soaring overhead."},{icon:"🌉",text:"The best views of the historic Bahia Honda Rail Bridge are from the bay-side beach."}]},
  { id:124, lat:30.2360, lng:-85.7760, name:"St. Andrews State Park (Shell Island)", region:"Panhandle", county:"Bay", emoji:"🏝️", color:"#2d8aaa", fact:"Shell Island — an undeveloped barrier island accessible by ferry from St. Andrews — with pristine Panhandle beach.", facts:[{icon:"🏝️",text:"Shell Island is accessible only by ferry from St. Andrews State Park — no roads or bridges."},{icon:"🐚",text:"Shelling is exceptional on the island's Gulf side, especially after winter storms."},{icon:"🦈",text:"Clear water around the island supports excellent snorkeling over natural limestone reefs."},{icon:"🐢",text:"Loggerhead sea turtles nest on the undisturbed beach, monitored by park rangers each summer."}]},
  { id:125, lat:29.0500, lng:-83.0590, name:"Chassahowitzka Wildlife Management Area", region:"Nature Coast", county:"Citrus/Hernando", emoji:"🦩", color:"#2d6e8a", fact:"A vast remote coastal wilderness on the Nature Coast accessible primarily by boat.", facts:[{icon:"🦩",text:"The WMA's spring-fed rivers support world-class wading bird and waterfowl populations."},{icon:"💧",text:"Multiple springs within the WMA feed crystal-clear rivers into the Gulf — critical manatee habitat."},{icon:"⛵",text:"Best explored by boat or kayak — few roads penetrate the interior wilderness."},{icon:"🐊",text:"American alligators and the endangered Atlantic sturgeon inhabit the Chassahowitzka River."}]},
  { id:126, lat:26.4010, lng:-80.0820, name:"John D. MacArthur Beach State Park (North Palm Beach)", region:"Southeast Florida", county:"Palm Beach", emoji:"🌊", color:"#2d8aaa", fact:"See John D. MacArthur Beach — pristine Atlantic beach with a boardwalk over a tropical lagoon.", facts:[{icon:"🌊",text:"One of the last undeveloped natural beach environments in Palm Beach County."},{icon:"🪸",text:"Snorkeling a natural reef just offshore reveals juvenile reef fish and coral."},{icon:"🐢",text:"Loggerhead, leatherback, and green sea turtles nest on the park's beach each summer."},{icon:"🌿",text:"Tropical coastal hammock lines the lagoon — a rare habitat remnant in Palm Beach."}]},
  { id:127, lat:29.8910, lng:-83.0060, name:"Troy Spring State Park", region:"North Florida", county:"Lafayette", emoji:"💧", color:"#1a5c7a", fact:"A first-magnitude spring with the visible submerged wreck of the Civil War steamboat Madison.", facts:[{icon:"🚢",text:"The steamboat Madison was scuttled here by Confederate forces in 1861 — the wreck is visible."},{icon:"💧",text:"Troy Spring discharges 70 million gallons of 68°F water per day into the Suwannee River."},{icon:"🤿",text:"Snorkeling and cave diving with excellent visibility revealing the wreck and spring cave."},{icon:"🦭",text:"Manatees seek the spring's warm water during cold winter weather."}]},
  { id:128, lat:29.0065, lng:-80.9046, name:"Turtle Mound Archaeological Site", region:"Central East Florida", county:"Volusia", emoji:"🐚", color:"#7a5020", fact:"The largest shell midden on the US East Coast — a 35-foot Timucuan shell mound visible from the Atlantic.", facts:[{icon:"🐚",text:"The mound contains an estimated 35 million pounds of oyster shell accumulated over 2,000 years."},{icon:"🏛️",text:"The mound was so large that Spanish explorers used it as a navigation landmark visible miles offshore."},{icon:"🌿",text:"A boardwalk spirals to the top through a remarkably preserved coastal hammock ecosystem."},{icon:"🦎",text:"Gopher tortoises have moved into the well-drained mound substrate and are easily observed."}]},
  { id:129, lat:29.6680, lng:-82.3280, name:"Paynes Prairie Preserve (La Chua Trail)", region:"North Central Florida", county:"Alachua", emoji:"🦬", color:"#6b7a2a", fact:"The La Chua Trail at Paynes Prairie — a premier wildlife viewing trail for bison, horses, and alligators.", facts:[{icon:"🦬",text:"The La Chua Trail is the best access point for viewing the prairie's wild bison and Spanish horses."},{icon:"🐊",text:"Hundreds of alligators are visible from the trail overlook — one of Florida's most dramatic wildlife sights."},{icon:"🦩",text:"Sandhill cranes, whooping cranes, and dozens of wading bird species forage in the wet prairie."},{icon:"🌾",text:"The trail descends from the upland into the vast open prairie through a classic Florida hammock."}]},
  { id:130, lat:30.3670, lng:-87.3060, name:"Perdido Key State Park", region:"Panhandle", county:"Escambia", emoji:"🏖️", color:"#e8c870", fact:"The most remote Florida Panhandle beach, with brilliant white sand and the endangered Perdido Key beach mouse.", facts:[{icon:"🐭",text:"The Perdido Key beach mouse is found only on this island — one of Florida's most endangered mammals."},{icon:"🏖️",text:"Classic Panhandle combination: sugar-white quartz sand and vivid emerald water."},{icon:"🌿",text:"Sea oat-covered dunes protect the beach mouse's burrow habitat and are legally protected."},{icon:"🦅",text:"Snowy plovers and least terns nest on the undisturbed sections each spring."}]},
  { id:131, lat:30.4760, lng:-84.2760, name:"Natural Bridge Battlefield Historic State Park", region:"Panhandle", county:"Leon", emoji:"⚔️", color:"#7a5020", fact:"Site of the last significant Confederate victory east of the Mississippi River on March 6, 1865.", facts:[{icon:"⚔️",text:"Confederate forces including teenage cadets repelled a Union attack here."},{icon:"🌊",text:"The St. Marks River disappears underground and reappears at a 'natural bridge' — the battle's namesake."},{icon:"🏛️",text:"Annual reenactments each March draw large crowds."},{icon:"🌿",text:"The river hammock is lush with magnolias, beeches, and rare limestone-associated plants."}]},
  { id:132, lat:27.0570, lng:-82.4420, name:"Delnor-Wiggins Pass State Park (North Collier)", region:"Southwest Florida", county:"Collier", emoji:"🌊", color:"#2d8aaa", fact:"Classic Gulf beach park at Wiggins Pass in North Naples — excellent shelling and wildlife watching.", facts:[{icon:"🌊",text:"The park sits at the mouth of Wiggins Pass where the Cocohatchee River meets the Gulf."},{icon:"🐚",text:"The beach is famous for shelling with lightning whelks, angel wings, and sand dollars."},{icon:"🦅",text:"Osprey nest on channel markers in the pass and bald eagles are frequently spotted."},{icon:"🐢",text:"Sea turtle monitoring is active here in summer."}]},
  { id:133, lat:29.7440, lng:-84.9990, name:"Bald Point State Park (Alligator Point Unit)", region:"Panhandle", county:"Franklin", emoji:"🌬️", color:"#2d6e8a", fact:"The Alligator Point unit of Bald Point — remote Gulf shoreline famous for wind and kite sports.", facts:[{icon:"🌬️",text:"Consistent Gulf winds make this one of the top kiteboarding and windsurfing spots in the Southeast."},{icon:"🌊",text:"The remote shoreline is backed by a mosaic of salt marsh, scrub, and coastal flatwoods."},{icon:"🦅",text:"Swallow-tailed kites pass through in large numbers during spring migration."},{icon:"🐢",text:"Loggerhead sea turtles nest on the undisturbed Alligator Point beach each summer."}]},
  { id:134, lat:28.7690, lng:-82.5840, name:"Crystal River Preserve (Kings Bay Unit)", region:"Nature Coast", county:"Citrus", emoji:"🦭", color:"#1a7a9a", fact:"The Kings Bay unit of Crystal River Preserve — prime swimming-with-manatees habitat.", facts:[{icon:"🦭",text:"Kings Bay hosts the largest concentration of wintering manatees in North America."},{icon:"🤿",text:"Crystal River is one of the only places in the world where you can legally swim with manatees."},{icon:"💧",text:"Over 30 springs keep Kings Bay at a constant 72°F year-round."},{icon:"🌿",text:"The surrounding preserve protects tidal marshes critical for wading bird nesting."}]},
  { id:135, lat:27.4650, lng:-82.5680, name:"Myakka River State Park (Upper Lake Unit)", region:"Southwest Florida", county:"Sarasota", emoji:"🐊", color:"#6b7a2a", fact:"The upper lake unit of Myakka River State Park — prime alligator and bird viewing.", facts:[{icon:"🐊",text:"Upper Myakka Lake is one of the most productive alligator viewing spots in all of Florida."},{icon:"🦅",text:"The airboat and tram tours on the upper lake offer close wildlife encounters."},{icon:"🌾",text:"Dry prairie habitat surrounding the upper lake supports crested caracaras and sandhill cranes."},{icon:"🌿",text:"The canopy walkway provides a bird's-eye view of the floodplain forest canopy."}]},
  { id:136, lat:26.0090, lng:-80.1220, name:"Dr. Von D. Mizell-Eula Johnson State Park", region:"Southeast Florida", county:"Broward", emoji:"🏖️", color:"#c4703a", fact:"Formerly John U. Lloyd Beach — significant as a segregation-era 'colored beach' in Broward County.", facts:[{icon:"✊",text:"Renamed in 2021 to honor Dr. Von Mizell and Eula Johnson, civil rights leaders who fought for beach access."},{icon:"🐢",text:"The park has some of the highest sea turtle nesting density in Broward County."},{icon:"⛵",text:"The inlet provides access to Port Everglades and the Intracoastal Waterway for boaters."},{icon:"🌿",text:"Coastal hammock and mangrove habitat within the park support surprising bird diversity."}]},
  { id:137, lat:26.3400, lng:-81.8100, name:"Mound Key Archaeological State Park (Estero Bay)", region:"Southwest Florida", county:"Lee", emoji:"🏛️", color:"#7a5020", fact:"The likely capital of the Calusa Kingdom — a massive shell mound island in Estero Bay.", facts:[{icon:"🏛️",text:"Mound Key was likely the capital city Calos of the powerful Calusa Kingdom."},{icon:"⛵",text:"Only accessible by paddling or boating through Estero Bay Aquatic Preserve."},{icon:"🐚",text:"The Calusa built this island entirely from shell refuse over 2,000 years of habitation."},{icon:"🌿",text:"Mangroves and tropical hammock now cover the mounds in a mysterious landscape."}]},
  { id:138, lat:29.8550, lng:-84.0180, name:"St. Marks Lighthouse Historic Area", region:"Panhandle", county:"Wakulla", emoji:"🏛️", color:"#2d6e8a", fact:"The historic 1831 St. Marks Lighthouse stands within the St. Marks NWR — one of Florida's oldest lighthouses.", facts:[{icon:"🏛️",text:"The St. Marks Lighthouse (1831) is one of the oldest surviving lighthouses in Florida."},{icon:"🦋",text:"Monarch butterflies funnel past the lighthouse each fall in spectacular migration numbers."},{icon:"🦅",text:"Bald eagles and ospreys nest in the surrounding pines near the lighthouse grounds."},{icon:"🌊",text:"The lighthouse sits at the edge of Apalachee Bay — a vast, shallow Gulf estuary."}]},
  { id:139, lat:25.5730, lng:-80.5050, name:"Everglades National Park (State Access/Royal Palm)", region:"South Florida", county:"Miami-Dade/Monroe", emoji:"🐊", color:"#1a5a2a", fact:"The largest subtropical wilderness in the US — the only place in the world where alligators and crocodiles coexist.", facts:[{icon:"🐊",text:"Everglades is the only place in the world where American alligators and American crocodiles naturally coexist."},{icon:"🌿",text:"The 'River of Grass' is actually a vast, slow-moving sheet of water flowing south through sawgrass prairie."},{icon:"🦩",text:"Historically the largest wading bird rookery in North America with millions of herons, egrets, and ibis."},{icon:"🎿",text:"UNESCO World Heritage Site, International Biosphere Reserve, and Ramsar Wetland of International Importance."}]},
  { id:140, lat:29.4800, lng:-82.8900, name:"Waccasassa Bay Preserve State Park", region:"Nature Coast", county:"Levy", emoji:"🌊", color:"#2d6e8a", fact:"A remote, undeveloped coastal preserve accessible only by boat, protecting vital Gulf Coast wetlands.", facts:[{icon:"🌊",text:"Over 30,000 acres of tidal marsh, mangrove, and Gulf coastal wetlands."},{icon:"⛵",text:"There are no roads — access is only by boat from the Gulf Hammock boat ramp."},{icon:"🦩",text:"Critical nesting and foraging habitat for wood storks, roseate spoonbills, and bald eagles."},{icon:"🐊",text:"American alligators and American crocodiles both occur within the preserve's brackish wetlands."}]},
  { id:141, lat:29.6380, lng:-82.3580, name:"Paynes Prairie Preserve (Alachua Sink Trail)", region:"North Central Florida", county:"Alachua", emoji:"🕳️", color:"#6b7a2a", fact:"The Alachua Sink Trail at Paynes Prairie — access to the famous sinkhole that once drained the entire lake.", facts:[{icon:"🕳️",text:"The Alachua Sink is the geological feature that suddenly drained the ancient lake in 1891, creating the prairie."},{icon:"🌿",text:"The trail winds through beautiful live oak hammock to the edge of the wet prairie basin."},{icon:"🦅",text:"Bald eagles, swallow-tailed kites, and sandhill cranes are commonly spotted from the trail."},{icon:"🐊",text:"American alligators are frequently visible in the marsh adjacent to the sink trail."}]},
  { id:142, lat:30.5340, lng:-87.2170, name:"Big Lagoon State Park (West Unit)", region:"Panhandle", county:"Escambia", emoji:"🌅", color:"#c4703a", fact:"The western unit of Big Lagoon State Park — prime Panhandle sunset viewing and lagoon fishing.", facts:[{icon:"🌅",text:"The observation tower offers some of the most spectacular Gulf Coast sunset views anywhere."},{icon:"🎣",text:"The lagoon and its tidal creeks offer excellent fishing for redfish, flounder, and speckled trout."},{icon:"🦅",text:"Ospreys and bald eagles nest in the park's tall pines overlooking Big Lagoon."},{icon:"🐚",text:"The lagoon's shell-hash beaches attract shorebirds and offer casual shell collecting."}]},
  { id:143, lat:29.0760, lng:-81.3190, name:"De Bary Hall Historic State Park", region:"Central Florida", county:"Volusia", emoji:"🏛️", color:"#7a5020", fact:"A magnificent 1871 winter estate on the St. Johns River, built by Florida's most famous Belgian wine baron.", facts:[{icon:"🏛️",text:"De Bary Hall was built in 1871 by Frederick de Bary — a Belgian champagne merchant — as a winter retreat."},{icon:"🌿",text:"The estate's gardens and hammock sit on a high bluff overlooking the St. Johns River."},{icon:"🛶",text:"The St. Johns River adjacent to the property offers excellent fishing and paddling."},{icon:"🦅",text:"Bald eagles and anhingas are commonly observed from the estate's bluff overlooking the river."}]},
  { id:144, lat:26.5030, lng:-80.0680, name:"Coral Cove Park / Blowing Rocks Preserve", region:"Southeast Florida", county:"Palm Beach", emoji:"🪸", color:"#1a7a8a", fact:"Rocky Anastasia limestone outcroppings on Jupiter Island with excellent snorkeling and dramatic wave action.", facts:[{icon:"🪸",text:"Rocky limestone outcroppings extend into the sea, creating a natural snorkeling reef."},{icon:"🌊",text:"The limestone 'blowing rocks' shoot dramatic plumes of water skyward during high surf."},{icon:"🦷",text:"Fossilized shark teeth and coral can be found among the beach rocks and sand."},{icon:"🐢",text:"Sea turtle nesting is active along this stretch of Jupiter Island beach in summer."}]},
  { id:145, lat:30.2590, lng:-83.5070, name:"Madison Blue Spring State Park", region:"North Florida", county:"Madison", emoji:"💙", color:"#1a5c7a", fact:"One of Florida's clearest springs, with a striking deep-blue color and strong flow into the Withlacoochee River.", facts:[{icon:"💙",text:"The spring's remarkable deep-blue color is caused by light scattering through exceptionally clear water."},{icon:"💧",text:"Discharges a strong flow year-round, keeping the temperature at a constant 68°F."},{icon:"🤿",text:"Cave diving extends deep into the Florida aquifer through a cave system at the spring head."},{icon:"🦭",text:"Manatees use the spring as a warm refuge from cold river water during winter months."}]},
  { id:146, lat:26.1300, lng:-81.7820, name:"Collier-Seminole State Park (Canoe Launch)", region:"South Florida", county:"Collier", emoji:"🛶", color:"#1a5a2a", fact:"The canoe launch unit of Collier-Seminole — gateway to the Ten Thousand Islands wilderness paddle.", facts:[{icon:"🛶",text:"The 13-mile wilderness canoe trail begins here, winding through the Ten Thousand Islands."},{icon:"🌿",text:"The trail passes through some of the most remote and pristine mangrove estuary in Florida."},{icon:"🦩",text:"Wood storks, spoonbills, and the rare snail kite can be observed along the canoe trail."},{icon:"🐊",text:"American alligators and American crocodiles are both present in the estuary."}]},
  { id:147, lat:29.8880, lng:-84.5100, name:"Ochlockonee River State Park (Campground)", region:"Panhandle", county:"Wakulla", emoji:"🏕️", color:"#4a6741", fact:"The campground unit of Ochlockonee River State Park — one of the most scenic camping spots in the Panhandle.", facts:[{icon:"🏕️",text:"Gulf-side camping at the Ochlockonee River mouth with stunning sunsets over the water."},{icon:"🎣",text:"Excellent fishing for redfish and speckled trout in the river and adjacent tidal creeks."},{icon:"🌿",text:"Longleaf pine flatwoods surround the campground — a beautiful and increasingly rare landscape."},{icon:"🦅",text:"Bald eagles nest in the tall longleaf pines near the campground."}]},
  { id:148, lat:29.8060, lng:-82.4700, name:"Osceola National Forest (Big Gum Swamp Wilderness)", region:"North Central Florida", county:"Baker/Columbia", emoji:"🌲", color:"#3d6632", fact:"The Big Gum Swamp Wilderness within Osceola National Forest — one of Florida's wildest roadless areas.", facts:[{icon:"🌲",text:"Big Gum Swamp is a federally designated wilderness — no roads or mechanized equipment permitted."},{icon:"🐊",text:"Alligators, black bears, and Florida panthers have all been documented in the swamp."},{icon:"🌿",text:"Ancient bald cypress and pond cypress form the swamp's magnificent interior canopy."},{icon:"🎵",text:"The barred owl chorus at dusk in the Big Gum Swamp is one of Florida's most spectacular natural sounds."}]},
  { id:149, lat:29.7570, lng:-85.1810, name:"St. Joseph Peninsula State Park (Campground)", region:"Panhandle", county:"Gulf", emoji:"🏕️", color:"#2d8aaa", fact:"The campground unit of St. Joseph Peninsula — camping right on one of Florida's wildest Gulf beaches.", facts:[{icon:"🏕️",text:"Campsites sit directly on the Gulf-front dunes with no roads between tent and ocean."},{icon:"🦅",text:"The peninsula is one of the top raptor migration watchpoints in the eastern United States."},{icon:"🐚",text:"Shelling is exceptional on both the Gulf side and St. Joseph Bay side of the peninsula."},{icon:"🐢",text:"Loggerhead sea turtle nesting density here is among the highest in the Florida Panhandle."}]},
  { id:150, lat:25.0210, lng:-80.4140, name:"Dagny Johnson Key Largo Hammock Botanical State Park", region:"Florida Keys", county:"Monroe", emoji:"🌿", color:"#1a6a3a", fact:"Protects the largest tropical hardwood hammock in the continental United States on North Key Largo.", facts:[{icon:"🌿",text:"Over 100 species of protected plants and 125 species of protected animals live in the hammock."},{icon:"🦜",text:"The white-crowned pigeon and mangrove cuckoo nest in the thick canopy."},{icon:"🌺",text:"Rare tropical plants like Jamaica dogwood, poisonwood, and wild tamarind create a jungle-like interior."},{icon:"🐍",text:"The Eastern indigo snake — the longest native snake in North America — is found in the hammock."}]},
  { id:151, lat:28.8030, lng:-82.1980, name:"Lake June-in-Winter Scrub State Park", region:"Central Florida", county:"Highlands", emoji:"🌵", color:"#9ab08d", fact:"Protects outstanding ancient Florida scrub — a rare, desert-like ecosystem rich in endemic species.", facts:[{icon:"🌵",text:"One of the finest examples of ancient sand scrub in the Lake Wales Ridge region."},{icon:"🦜",text:"The Florida scrub-jay — found only in Florida — is a year-round resident easily observed."},{icon:"🐢",text:"Florida gopher tortoise, Florida mouse, and Florida scrub lizard are endemic scrub species."},{icon:"🌸",text:"Rare plants like nodding pinweed and scrub morning-glory bloom seasonally."}]},
  { id:152, lat:27.7450, lng:-82.6210, name:"Manatee Springs State Park (Suwannee Unit)", region:"Nature Coast", county:"Gilchrist", emoji:"🦭", color:"#3a8070", fact:"The Suwannee River confluence unit of Manatee Springs — where the spring run meets the Suwannee.", facts:[{icon:"🦭",text:"Manatees move between the Suwannee River and the spring run, often visible from the boardwalk."},{icon:"💧",text:"The spring run's 68°F water enters the Suwannee River here in a spectacular confluence."},{icon:"🌿",text:"A magnificent bald cypress boardwalk extends to the spring head through ancient swamp."},{icon:"🎣",text:"The Suwannee River adjacent to the park offers excellent fishing for largemouth bass and catfish."}]},
  { id:153, lat:30.6060, lng:-87.1320, name:"Blackwater River State Forest", region:"Panhandle", county:"Santa Rosa/Okaloosa", emoji:"🌲", color:"#3d6632", fact:"Florida's largest state forest — 183,000 acres of longleaf pine flatwoods and blackwater streams.", facts:[{icon:"🌲",text:"At 183,000 acres, Blackwater River State Forest is the largest state forest in Florida."},{icon:"🌿",text:"Ancient longleaf pine forests and pristine blackwater streams define this remarkable landscape."},{icon:"🐦",text:"Red-cockaded woodpeckers — federally endangered — maintain colonies in old-growth longleaf pines."},{icon:"🏕️",text:"The forest offers primitive camping, hunting, fishing, and hiking on extensive trail networks."}]},

// State
let visited = JSON.parse(localStorage.getItem('fl-parks-visited') || '[]');
let activeFilter = 'all';
let searchQuery = '';

function saveVisited() {
  localStorage.setItem('fl-parks-visited', JSON.stringify(visited));
  localStorage.setItem('fl-parks-dates', JSON.stringify(visitDates));
}
let visitDates = JSON.parse(localStorage.getItem('fl-parks-dates') || '{}');

function updateStats() {
  const v = visited.length;
  const t = PARKS.length;
  document.getElementById('visited-count').textContent = v;
  document.getElementById('total-count').textContent = t;
  document.getElementById('pct-count').textContent = Math.round(v / t * 100) + '%';
}

function renderBadges() {
  const row = document.getElementById('badges-row');
  if (visited.length === 0) {
    row.innerHTML = '<div class="empty-badges">Visit parks to earn badges!</div>';
    return;
  }
  row.innerHTML = visited.map(id => {
    const park = PARKS.find(p => p.id === id);
    return `<div class="mini-badge" title="${park.name}" onclick="openModal(${park.id}, false)">${park.emoji}</div>`;
  }).join('');
}

function getFilteredParks() {
  return PARKS.filter(p => {
    const matchSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase()) ||
                        p.county.toLowerCase().includes(searchQuery.toLowerCase());
    const isVisited = visited.includes(p.id);
    if (activeFilter === 'visited' && !isVisited) return false;
    if (activeFilter === 'unvisited' && isVisited) return false;
    if (activeFilter === 'nassau' && !p.county.toLowerCase().includes('nassau')) return false;
    return matchSearch;
  });
}

function renderGrid() {
  const grid = document.getElementById('grid');
  const parks = getFilteredParks();
  if (parks.length === 0) {
    grid.innerHTML = '<div class="no-results">🌿 No parks found. Try a different search!</div>';
    return;
  }
  grid.innerHTML = parks.map(park => {
    const isVisited = visited.includes(park.id);
    const isNassau = park.county.toLowerCase().includes('nassau');
    return `
      <div class="park-card ${isVisited ? 'visited' : ''} ${isNassau ? 'nassau-highlight' : ''}" onclick="openModal(${park.id}, !${isVisited})">
        <div class="card-banner" style="background: linear-gradient(135deg, ${park.color}dd, ${park.color}88)">
          ${isVisited ? '<div class="visited-stamp">✓ Visited</div>' : ''}
          <span style="font-size:52px;z-index:1;position:relative">${park.emoji}</span>
        </div>
        <div class="card-body">
          <div class="park-region">${park.region}</div>
          <div class="park-name">${park.name}${isNassau ? '<span class="nassau-tag">Local</span>' : ''}</div>
          <div class="park-fact">${park.fact}</div>
          <div class="card-footer">
            <div class="park-county">📍 ${park.county} Co.</div>
            <button class="visit-btn ${isVisited ? 'visited-btn' : ''}" onclick="event.stopPropagation(); toggleVisit(${park.id})">
              ${isVisited ? '✓ Visited' : '+ Mark Visited'}
            </button>
          </div>
        </div>
      </div>
    `;
  }).join('');
}

function toggleVisit(id) {
  if (visited.includes(id)) {
    visited = visited.filter(v => v !== id);
    delete visitDates[id];
  } else {
    visited.push(id);
    visitDates[id] = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    openModal(id, false);
  }
  saveVisited();
  updateStats();
  renderBadges();
  renderGrid();
}

function openModal(id, shouldMarkVisited) {
  const park = PARKS.find(p => p.id === id);
  if (!park) return;

  if (shouldMarkVisited && !visited.includes(id)) {
    visited.push(id);
    visitDates[id] = new Date().toLocaleDateString('en-US', { month: 'long', day: 'numeric', year: 'numeric' });
    saveVisited();
    updateStats();
    renderBadges();
    renderGrid();
  }

  document.getElementById('badge-emoji').textContent = park.emoji;
  document.getElementById('badge-emoji').style.background = `radial-gradient(circle, ${park.color}ff, ${park.color}88)`;
  document.getElementById('modal-name').textContent = park.name;
  document.getElementById('modal-region').textContent = `${park.region} • ${park.county} County`;
  document.getElementById('modal-facts').innerHTML = park.facts.map(f =>
    `<div class="fact-item"><span class="fact-icon">${f.icon}</span><span>${f.text}</span></div>`
  ).join('');
  const date = visitDates[id];
  document.getElementById('modal-date').textContent = date ? `Visited: ${date}` : '';

  // Stars burst animation
  const burst = document.getElementById('stars-burst');
  burst.innerHTML = '';
  if (shouldMarkVisited) {
    ['⭐','✨','🌟','⭐','✨'].forEach((s, i) => {
      const el = document.createElement('div');
      el.className = 'star';
      el.textContent = s;
      const angle = (i / 5) * 360;
      const r = 80;
      el.style.setProperty('--tx', `${Math.cos(angle * Math.PI/180) * r}px`);
      el.style.setProperty('--ty', `${Math.sin(angle * Math.PI/180) * r}px`);
      el.style.animationDelay = `${i * 0.08}s`;
      burst.appendChild(el);
    });
  }

  document.getElementById('modal-overlay').classList.add('open');
}

document.getElementById('modal-close').addEventListener('click', () => {
  document.getElementById('modal-overlay').classList.remove('open');
});
document.getElementById('modal-overlay').addEventListener('click', e => {
  if (e.target === e.currentTarget) document.getElementById('modal-overlay').classList.remove('open');
});

document.getElementById('search').addEventListener('input', e => {
  searchQuery = e.target.value;
  renderGrid();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeFilter = btn.dataset.filter;
    renderGrid();
  });
});


// GPS
const GPS_RADIUS_CHECKIN = 1.0; // km — within this distance, auto-highlight as "at park"
const GPS_RADIUS_NEARBY = 25;   // km — show parks within this range

function haversine(lat1, lng1, lat2, lng2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLng = (lng2 - lng1) * Math.PI / 180;
  const a = Math.sin(dLat/2)**2 + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLng/2)**2;
  return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function formatDist(km) {
  if (km < 1) return (km * 1000).toFixed(0) + ' m away';
  return km.toFixed(1) + ' km away';
}

function startGPS() {
  const btn = document.getElementById('gps-btn');
  const status = document.getElementById('gps-status');
  if (!navigator.geolocation) {
    status.textContent = 'GPS not supported on this device.';
    status.className = 'gps-status error';
    return;
  }
  btn.classList.add('scanning');
  document.getElementById('gps-icon').textContent = '🔄';
  status.textContent = 'Getting your location...';
  status.className = 'gps-status';
  navigator.geolocation.getCurrentPosition(
    pos => {
      btn.classList.remove('scanning');
      document.getElementById('gps-icon').textContent = '📍';
      const { latitude, longitude, accuracy } = pos.coords;
      showNearbyParks(latitude, longitude, accuracy);
    },
    err => {
      btn.classList.remove('scanning');
      document.getElementById('gps-icon').textContent = '📍';
      const msgs = {1:'Location access denied. Please enable in browser settings.', 2:'Unable to determine location. Try again outside.', 3:'Location request timed out. Try again.'};
      status.textContent = msgs[err.code] || 'Location error. Try again.';
      status.className = 'gps-status error';
    },
    { enableHighAccuracy: true, timeout: 15000, maximumAge: 30000 }
  );
}

function showNearbyParks(lat, lng, accuracy) {
  const status = document.getElementById('gps-status');
  const nearbySection = document.getElementById('gps-nearby-cards');
  const nearbyList = document.getElementById('nearby-list');

  const parksWithDist = PARKS.map(p => ({
    ...p,
    dist: haversine(lat, lng, p.lat, p.lng)
  })).filter(p => p.dist <= GPS_RADIUS_NEARBY)
     .sort((a, b) => a.dist - b.dist);

  if (parksWithDist.length === 0) {
    status.textContent = 'No Florida State Parks within 25 km. Drive closer to a park and try again!';
    status.className = 'gps-status';
    nearbySection.classList.remove('show');
    return;
  }

  const closest = parksWithDist[0];
  const atPark = closest.dist <= GPS_RADIUS_CHECKIN;

  if (atPark) {
    status.textContent = 'You are at ' + closest.name + '! Badge unlocked!';
    status.className = 'gps-status found';
  } else {
    const accText = accuracy ? ' (±' + Math.round(accuracy) + 'm)' : '';
    status.textContent = parksWithDist.length + ' park' + (parksWithDist.length > 1 ? 's' : '') + ' found nearby' + accText;
    status.className = 'gps-status found';
  }

  nearbyList.innerHTML = parksWithDist.slice(0, 6).map(park => {
    const isVisited = visited.includes(park.id);
    const atThisPark = park.dist <= GPS_RADIUS_CHECKIN;
    const distClass = park.dist < 1 ? 'close' : 'medium';
    return '<div class="nearby-card ' + (atThisPark ? 'at-park' : '') + '" onclick="openModal(' + park.id + ', ' + (!isVisited) + ')">' +
      '<div class="nearby-emoji">' + park.emoji + '</div>' +
      '<div class="nearby-info">' +
        '<div class="nearby-name">' + park.name + '</div>' +
        '<div class="nearby-dist ' + distClass + '">' + (atThisPark ? '✅ You are here!' : formatDist(park.dist)) + '</div>' +
      '</div>' +
      '<button class="nearby-checkin-btn ' + (isVisited ? 'done' : '') + '" onclick="event.stopPropagation(); gpsTap(' + park.id + ', ' + atThisPark + ')">' +
        (isVisited ? '✓ Done' : atThisPark ? '🏅 Check In' : '+ Add') +
      '</button>' +
    '</div>';
  }).join('');

  nearbySection.classList.add('show');

  // Auto-check-in if at park
  if (atPark && !visited.includes(closest.id)) {
    setTimeout(() => { toggleVisit(closest.id); }, 600);
  }
}

function gpsTap(id, atPark) {
  if (atPark || !visited.includes(id)) {
    toggleVisit(id);
    // Refresh nearby list display
    document.querySelectorAll('.nearby-card').forEach(card => {
      const btn = card.querySelector('.nearby-checkin-btn');
      if (btn) {
        const cardId = parseInt(btn.getAttribute('onclick').match(/\d+/)[0]);
        if (cardId === id && visited.includes(id)) {
          btn.textContent = '✓ Done';
          btn.classList.add('done');
        }
      }
    });
  }
}

// Init
updateStats();
renderBadges();
renderGrid();
</script>

<!-- PWA Install Banner -->
<div id="install-banner" style="display:none; position:fixed; bottom:0; left:0; right:0; z-index:200; background:#1a1008; border-top:3px solid #c9a84c; padding:14px 18px; font-family:'Special Elite',cursive;">
  <div style="max-width:600px; margin:0 auto; display:flex; align-items:center; gap:12px; flex-wrap:wrap;">
    <span style="font-size:28px;">🌿</span>
    <div style="flex:1; min-width:160px;">
      <div style="color:#c9a84c; font-size:13px; letter-spacing:1px;">INSTALL FL PARKS PASSPORT</div>
      <div id="install-instructions" style="color:#9ab08d; font-size:11px; margin-top:2px; letter-spacing:1px;"></div>
    </div>
    <button id="install-btn" onclick="installApp()" style="display:none; background:#c9a84c; color:#3d2b1f; border:none; border-radius:4px; padding:9px 18px; font-family:'Special Elite',cursive; font-size:12px; letter-spacing:2px; cursor:pointer; text-transform:uppercase; white-space:nowrap;">Add to Home Screen</button>
    <button onclick="document.getElementById('install-banner').style.display='none'" style="background:transparent; border:1px solid #4a6741; border-radius:4px; padding:8px 12px; color:#9ab08d; font-family:'Special Elite',cursive; font-size:11px; cursor:pointer; white-space:nowrap;">Dismiss</button>
  </div>
</div>

<script>
let deferredPrompt = null;

function isIOS() {
  return /iphone|ipad|ipod/i.test(navigator.userAgent) && !window.MSStream;
}
function isInStandaloneMode() {
  return window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
}

window.addEventListener('beforeinstallprompt', e => {
  e.preventDefault();
  deferredPrompt = e;
  showInstallBanner('android');
});

function showInstallBanner(platform) {
  if (isInStandaloneMode()) return; // already installed
  const banner = document.getElementById('install-banner');
  const instructions = document.getElementById('install-instructions');
  const installBtn = document.getElementById('install-btn');
  if (platform === 'ios') {
    instructions.textContent = 'Tap the Share button ↑ then "Add to Home Screen"';
    installBtn.style.display = 'none';
  } else {
    instructions.textContent = 'Install as an app — works offline!';
    installBtn.style.display = 'block';
  }
  banner.style.display = 'flex';
}

async function installApp() {
  if (!deferredPrompt) return;
  deferredPrompt.prompt();
  const result = await deferredPrompt.userChoice;
  deferredPrompt = null;
  document.getElementById('install-banner').style.display = 'none';
}

// Show iOS instructions after a short delay if on iPhone/iPad
window.addEventListener('load', () => {
  setTimeout(() => {
    if (isIOS() && !isInStandaloneMode()) {
      showInstallBanner('ios');
    }
  }, 3000);
});
</script>
