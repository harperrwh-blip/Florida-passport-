<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="theme-color" content="#3d2b1f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="FL Parks">
<meta name="description" content="Collect badges for every Florida State Park you visit. 175 parks with GPS check-in.">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icon-192.png">
<!-- Inline SVG icon as data URI for apple-touch-icon fallback -->
<link rel="apple-touch-icon" sizes="192x192" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 192 192'%3E%3Crect width='192' height='192' rx='40' fill='%233d2b1f'/%3E%3Ccircle cx='96' cy='96' r='70' fill='%23c9a84c' opacity='.2'/%3E%3Ccircle cx='96' cy='96' r='55' fill='none' stroke='%23c9a84c' stroke-width='4'/%3E%3Ctext x='96' y='118' text-anchor='middle' font-size='72'>🌿%3C/text%3E%3C/svg%3E">
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      // Inline service worker as blob URL so it works from file:// and any host
      const swCode = `
const CACHE = 'fl-parks-v1';
const ASSETS = [location.href];
self.addEventListener('install', e => {
  e.waitUntil(caches.open(CACHE).then(c => c.addAll(ASSETS)).then(() => self.skipWaiting()));
});
self.addEventListener('activate', e => {
  e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k => k !== CACHE).map(k => caches.delete(k)))).then(() => self.clients.claim()));
});
self.addEventListener('fetch', e => {
  e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
    const clone = res.clone();
    caches.open(CACHE).then(c => c.put(e.request, clone));
    return res;
  }).catch(() => caches.match(e.request))));
});
      `;
      const blob = new Blob([swCode], {type: 'application/javascript'});
      const swUrl = URL.createObjectURL(blob);
      navigator.serviceWorker.register(swUrl).then(reg => {
        console.log('SW registered');
      }).catch(err => console.log('SW reg failed (normal on file://):', err));
    });
  }
</script>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Florida State Parks Passport</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&family=Special+Elite&display=swap" rel="stylesheet">
<style>
  :root {
    --bark: #3d2b1f;
    --moss: #4a6741;
    --fern: #6b8f5e;
    --sage: #9ab08d;
    --sand: #e8dcc8;
    --parchment: #f5efe0;
    --water: #4a7fa5;
    --sky: #8db5cc;
    --sunset: #c4703a;
    --gold: #c9a84c;
    --cream: #faf6ed;
    --ink: #1e1208;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background-color: var(--bark);
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(0,0,0,0.03) 40px, rgba(0,0,0,0.03) 41px),
      repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(0,0,0,0.02) 40px, rgba(0,0,0,0.02) 41px);
    font-family: 'Libre Baskerville', serif;
    color: var(--ink);
    min-height: 100vh;
  }

  /* HEADER */
  .header {
    background: linear-gradient(160deg, #1a1008 0%, #2d1f0e 40%, #3d2b1f 100%);
    border-bottom: 4px solid var(--gold);
    padding: 28px 20px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    inset: 0;
    background: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23c9a84c' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    opacity: 0.6;
  }
  .header-seal {
    width: 70px; height: 70px;
    background: radial-gradient(circle, var(--gold) 0%, #a07830 60%, #7a5820 100%);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 12px;
    font-size: 32px;
    box-shadow: 0 0 0 3px var(--bark), 0 0 0 6px var(--gold), 0 4px 20px rgba(0,0,0,0.5);
    position: relative;
    z-index: 1;
    animation: seal-glow 3s ease-in-out infinite;
  }
  @keyframes seal-glow {
    0%, 100% { box-shadow: 0 0 0 3px var(--bark), 0 0 0 6px var(--gold), 0 4px 20px rgba(0,0,0,0.5); }
    50% { box-shadow: 0 0 0 3px var(--bark), 0 0 0 6px var(--gold), 0 4px 30px rgba(201,168,76,0.4); }
  }
  .header h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(22px, 5vw, 36px);
    font-weight: 900;
    color: var(--sand);
    letter-spacing: 2px;
    text-transform: uppercase;
    position: relative; z-index: 1;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .header-sub {
    font-family: 'Special Elite', cursive;
    color: var(--gold);
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-top: 4px;
    position: relative; z-index: 1;
  }
  .stats-bar {
    display: flex; justify-content: center; gap: 32px;
    margin-top: 16px;
    position: relative; z-index: 1;
  }
  .stat {
    text-align: center;
  }
  .stat-num {
    font-family: 'Playfair Display', serif;
    font-size: 26px; font-weight: 700;
    color: var(--gold);
  }
  .stat-label {
    font-family: 'Special Elite', cursive;
    font-size: 10px; color: var(--sage);
    letter-spacing: 2px; text-transform: uppercase;
  }

  /* SEARCH & FILTER */
  .controls {
    background: var(--parchment);
    border-bottom: 2px solid var(--sage);
    padding: 14px 16px;
    display: flex; gap: 10px; flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap {
    flex: 1; min-width: 180px;
    position: relative;
  }
  .search-wrap input {
    width: 100%;
    background: var(--cream);
    border: 2px solid var(--fern);
    border-radius: 4px;
    padding: 9px 12px 9px 36px;
    font-family: 'Libre Baskerville', serif;
    font-size: 13px;
    color: var(--ink);
    outline: none;
  }
  .search-wrap input:focus { border-color: var(--moss); }
  .search-icon {
    position: absolute; left: 11px; top: 50%; transform: translateY(-50%);
    font-size: 15px; pointer-events: none;
  }
  .filter-btn {
    background: var(--cream);
    border: 2px solid var(--sage);
    border-radius: 4px;
    padding: 8px 14px;
    font-family: 'Special Elite', cursive;
    font-size: 12px; letter-spacing: 1px;
    color: var(--bark);
    cursor: pointer;
    transition: all 0.2s;
  }
  .filter-btn:hover, .filter-btn.active {
    background: var(--moss);
    border-color: var(--moss);
    color: var(--cream);
  }

  /* GRID */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
    gap: 20px;
    padding: 24px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }

  /* PARK CARD */
  .park-card {
    background: var(--parchment);
    border-radius: 6px;
    overflow: hidden;
    box-shadow: 0 4px 16px rgba(0,0,0,0.35), inset 0 1px 0 rgba(255,255,255,0.3);
    transition: transform 0.25s, box-shadow 0.25s;
    cursor: pointer;
    position: relative;
    border: 1px solid rgba(74,103,65,0.3);
  }
  .park-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 10px 28px rgba(0,0,0,0.45);
  }
  .park-card.visited {
    border-color: var(--gold);
    box-shadow: 0 4px 16px rgba(201,168,76,0.3), inset 0 1px 0 rgba(255,255,255,0.3);
  }

  .card-banner {
    height: 90px;
    display: flex; align-items: center; justify-content: center;
    font-size: 52px;
    position: relative;
    overflow: hidden;
  }
  .card-banner::after {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(to bottom, transparent 40%, rgba(0,0,0,0.25) 100%);
  }
  .visited-stamp {
    position: absolute;
    top: 8px; right: 10px;
    background: var(--gold);
    color: var(--bark);
    font-family: 'Special Elite', cursive;
    font-size: 9px; letter-spacing: 2px;
    text-transform: uppercase;
    padding: 3px 8px;
    border-radius: 2px;
    z-index: 2;
    transform: rotate(3deg);
    box-shadow: 0 2px 6px rgba(0,0,0,0.3);
  }

  .card-body { padding: 14px 16px 16px; }
  .park-region {
    font-family: 'Special Elite', cursive;
    font-size: 10px; letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--fern);
    margin-bottom: 4px;
  }
  .park-name {
    font-family: 'Playfair Display', serif;
    font-size: 17px; font-weight: 700;
    color: var(--bark);
    line-height: 1.2;
    margin-bottom: 8px;
  }
  .park-fact {
    font-size: 12px;
    color: #5a4030;
    line-height: 1.5;
    font-style: italic;
    border-left: 3px solid var(--sage);
    padding-left: 10px;
    margin-bottom: 12px;
  }
  .card-footer {
    display: flex; justify-content: space-between; align-items: center;
  }
  .park-county {
    font-family: 'Special Elite', cursive;
    font-size: 11px; color: var(--water);
    letter-spacing: 1px;
  }
  .visit-btn {
    background: var(--moss);
    color: var(--cream);
    border: none;
    border-radius: 3px;
    padding: 7px 14px;
    font-family: 'Special Elite', cursive;
    font-size: 11px; letter-spacing: 1px;
    cursor: pointer;
    transition: all 0.2s;
    text-transform: uppercase;
  }
  .visit-btn:hover { background: var(--bark); }
  .visit-btn.visited-btn {
    background: var(--gold);
    color: var(--bark);
  }
  .visit-btn.visited-btn:hover { background: var(--sunset); color: var(--cream); }

  /* BADGE MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(20,12,4,0.85);
    display: flex; align-items: center; justify-content: center;
    z-index: 100;
    padding: 20px;
    backdrop-filter: blur(4px);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .modal-overlay.open { opacity: 1; pointer-events: all; }

  .modal {
    background: var(--parchment);
    border-radius: 8px;
    max-width: 420px; width: 100%;
    overflow: hidden;
    box-shadow: 0 20px 60px rgba(0,0,0,0.6), 0 0 0 3px var(--gold);
    transform: scale(0.85);
    transition: transform 0.3s;
  }
  .modal-overlay.open .modal { transform: scale(1); }

  .modal-banner {
    height: 140px;
    display: flex; align-items: center; justify-content: center;
    font-size: 80px;
    position: relative;
  }
  .badge-ring {
    position: absolute;
    width: 120px; height: 120px;
    border-radius: 50%;
    border: 4px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 70px;
    animation: badge-pop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    box-shadow: 0 0 0 8px rgba(201,168,76,0.2), 0 8px 32px rgba(0,0,0,0.4);
  }
  @keyframes badge-pop {
    0% { transform: scale(0) rotate(-20deg); opacity: 0; }
    100% { transform: scale(1) rotate(0deg); opacity: 1; }
  }
  .stars-burst {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    pointer-events: none;
  }
  .star {
    position: absolute;
    font-size: 16px;
    animation: star-fly 0.6s ease-out forwards;
    opacity: 0;
  }
  @keyframes star-fly {
    0% { transform: translate(0,0) scale(0); opacity: 1; }
    100% { transform: translate(var(--tx), var(--ty)) scale(1); opacity: 0; }
  }

  .modal-body { padding: 20px 24px 24px; }
  .modal-badge-label {
    font-family: 'Special Elite', cursive;
    font-size: 11px; letter-spacing: 3px;
    text-transform: uppercase; color: var(--gold);
    text-align: center; margin-bottom: 6px;
  }
  .modal-park-name {
    font-family: 'Playfair Display', serif;
    font-size: 24px; font-weight: 900;
    color: var(--bark); text-align: center;
    margin-bottom: 4px;
  }
  .modal-region {
    font-family: 'Special Elite', cursive;
    font-size: 11px; letter-spacing: 2px;
    color: var(--fern); text-align: center;
    text-transform: uppercase; margin-bottom: 16px;
  }
  .divider {
    height: 1px;
    background: linear-gradient(to right, transparent, var(--sage), transparent);
    margin: 14px 0;
  }
  .facts-title {
    font-family: 'Special Elite', cursive;
    font-size: 11px; letter-spacing: 2px;
    text-transform: uppercase; color: var(--fern);
    margin-bottom: 10px;
  }
  .fact-item {
    display: flex; gap: 10px;
    margin-bottom: 10px;
    font-size: 13px;
    color: #4a3020;
    line-height: 1.5;
  }
  .fact-icon { font-size: 16px; flex-shrink: 0; margin-top: 1px; }
  .visit-date {
    font-family: 'Special Elite', cursive;
    font-size: 12px; color: var(--water);
    text-align: center; margin-top: 14px;
  }
  .modal-close {
    display: block; width: 100%;
    background: var(--moss);
    color: var(--cream);
    border: none;
    padding: 12px;
    font-family: 'Special Elite', cursive;
    font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    margin-top: 16px;
    border-radius: 4px;
    transition: background 0.2s;
  }
  .modal-close:hover { background: var(--bark); }

  /* BADGES COLLECTION */
  .collection-header {
    text-align: center;
    padding: 30px 20px 0;
    max-width: 1200px;
    margin: 0 auto;
  }
  .collection-title {
    font-family: 'Playfair Display', serif;
    font-size: 13px; font-weight: 700;
    color: var(--sand);
    letter-spacing: 3px;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .badges-row {
    display: flex; flex-wrap: wrap; gap: 10px;
    justify-content: center;
    padding: 0 20px 20px;
    max-width: 1200px;
    margin: 0 auto;
  }
  .mini-badge {
    width: 52px; height: 52px;
    background: radial-gradient(circle, #c9a84c, #7a5820);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 26px;
    box-shadow: 0 0 0 2px var(--bark), 0 0 0 4px var(--gold), 0 3px 8px rgba(0,0,0,0.4);
    cursor: pointer;
    transition: transform 0.2s;
    title: '';
  }
  .mini-badge:hover { transform: scale(1.15); }
  .empty-badges {
    font-family: 'Special Elite', cursive;
    font-size: 13px; color: var(--sage);
    letter-spacing: 1px; text-align: center;
    padding: 8px 20px 20px;
    opacity: 0.7;
  }

  /* NASSAU HIGHLIGHT */
  .nassau-highlight .park-name { color: var(--moss); }
  .nassau-tag {
    display: inline-block;
    background: var(--moss);
    color: var(--cream);
    font-family: 'Special Elite', cursive;
    font-size: 9px; letter-spacing: 1px;
    padding: 2px 6px; border-radius: 2px;
    margin-left: 6px; vertical-align: middle;
    text-transform: uppercase;
  }

  .no-results {
    grid-column: 1 / -1;
    text-align: center;
    padding: 60px 20px;
    font-family: 'Special Elite', cursive;
    color: var(--sand);
    font-size: 18px;
    opacity: 0.6;
  }


  /* GPS CHECK-IN */
  .gps-bar {
    background: linear-gradient(135deg, #1a1008, #2d1f0e);
    border-bottom: 3px solid var(--gold);
    padding: 14px 20px;
    display: flex; align-items: center; gap: 12px;
    flex-wrap: wrap;
  }
  .gps-btn {
    background: var(--gold);
    color: var(--bark);
    border: none; border-radius: 4px;
    padding: 10px 20px;
    font-family: 'Special Elite', cursive;
    font-size: 13px; letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer; transition: all 0.2s;
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .gps-btn:hover { background: var(--sunset); color: var(--cream); }
  .gps-btn.scanning { animation: gps-pulse 1.2s ease-in-out infinite; }
  @keyframes gps-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(201,168,76,0.5); }
    50% { box-shadow: 0 0 0 10px rgba(201,168,76,0); }
  }
  .gps-status { font-family: 'Special Elite', cursive; font-size: 12px; letter-spacing: 1px; color: var(--sage); flex: 1; }
  .gps-status.found { color: var(--gold); }
  .gps-status.error { color: #e06060; }
  .gps-nearby-cards { background: #2a1a0a; border-bottom: 2px solid var(--fern); padding: 14px 20px; display: none; }
  .gps-nearby-cards.show { display: block; }
  .gps-nearby-title { font-family: 'Special Elite', cursive; font-size: 11px; letter-spacing: 3px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
  .nearby-list { display: flex; gap: 10px; flex-wrap: wrap; }
  .nearby-card { background: var(--parchment); border-radius: 5px; padding: 10px 14px; display: flex; align-items: center; gap: 10px; cursor: pointer; transition: transform 0.2s, box-shadow 0.2s; border: 2px solid transparent; min-width: 180px; flex: 1; }
  .nearby-card:hover { transform: translateY(-2px); box-shadow: 0 6px 16px rgba(0,0,0,0.4); }
  .nearby-card.at-park { border-color: var(--gold); background: #fff9ee; }
  .nearby-emoji { font-size: 28px; }
  .nearby-info { flex: 1; }
  .nearby-name { font-family: 'Playfair Display', serif; font-size: 13px; font-weight: 700; color: var(--bark); line-height: 1.2; }
  .nearby-dist { font-family: 'Special Elite', cursive; font-size: 11px; margin-top: 2px; }
  .nearby-dist.close { color: var(--moss); }
  .nearby-dist.medium { color: var(--water); }
  .nearby-checkin-btn { background: var(--moss); color: var(--cream); border: none; border-radius: 3px; padding: 5px 10px; font-family: 'Special Elite', cursive; font-size: 10px; letter-spacing: 1px; cursor: pointer; text-transform: uppercase; transition: background 0.2s; white-space: nowrap; }
  .nearby-checkin-btn:hover { background: var(--bark); }
  .nearby-checkin-btn.done { background: var(--gold); color: var(--bark); }

  ::-webkit-scrollbar { width: 8px; }
  ::-webkit-scrollbar-track { background: var(--bark); }
  ::-webkit-scrollbar-thumb { background: var(--fern); border-radius: 4px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-seal">🌿</div>
  <h1>Florida State Parks Passport</h1>
  <div class="header-sub">Collect Your Adventures</div>
  <div class="stats-bar">
    <div class="stat">
      <div class="stat-num" id="visited-count">0</div>
      <div class="stat-label">Visited</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="total-count">0</div>
      <div class="stat-label">Total Parks</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="pct-count">0%</div>
      <div class="stat-label">Complete</div>
    </div>
  </div>
</div>

<div class="collection-header">
  <div class="collection-title">⭐ Your Badge Collection</div>
</div>
<div class="badges-row" id="badges-row">
  <div class="empty-badges">Visit parks to earn badges!</div>
</div>


<div class="gps-bar">
  <button class="gps-btn" id="gps-btn" onclick="startGPS()">
    <span id="gps-icon">📍</span> Check Me In
  </button>
  <div class="gps-status" id="gps-status">Tap to detect your location and find nearby parks</div>
</div>
<div class="gps-nearby-cards" id="gps-nearby-cards">
  <div class="gps-nearby-title">📍 Parks Near You</div>
  <div class="nearby-list" id="nearby-list"></div>
</div>

<div class="controls">
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input type="text" id="search" placeholder="Search parks...">
  </div>
  <button class="filter-btn active" data-filter="all">All Parks</button>
  <button class="filter-btn" data-filter="visited">Visited</button>
  <button class="filter-btn" data-filter="unvisited">Not Yet</button>
  <button class="filter-btn" data-filter="nassau">Nassau County</button>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modal-overlay">
  <div class="modal">
    <div class="modal-banner" id="modal-banner">
      <div class="stars-burst" id="stars-burst"></div>
      <div class="badge-ring" id="badge-emoji"></div>
    </div>
    <div class="modal-body">
      <div class="modal-badge-label">🏅 Badge Earned!</div>
      <div class="modal-park-name" id="modal-name"></div>
      <div class="modal-region" id="modal-region"></div>
      <div class="divider"></div>

<script>
const PARKS = [
  { id:1, lat:30.6741, lng:-81.4395, name:"Addison Blockhouse Historic State Park", region:"Northeast Florida", county:"Volusia", emoji:"🏚️", color:"#7a5020", fact:"Ruins of a 19th-century sugar plantation and blockhouse attacked during the Second Seminole War.", facts:[{icon:"⚔️",text:"The blockhouse was attacked by Seminole warriors in 1836 during the Second Seminole War."},{icon:"🌿",text:"Ancient live oaks draped in Spanish moss canopy the ruins."},{icon:"🏛️",text:"One of the least-visited historic sites in Florida, preserving genuine frontier-era ruins."},{icon:"🦎",text:"Gopher tortoises and Florida scrub lizards inhabit the scrub surrounding the ruins."}]},
  { id:2, lat:27.7520, lng:-82.1024, name:"Alafia River State Park", region:"Central Florida", county:"Hillsborough", emoji:"🚵", color:"#5a7a30", fact:"Built on a reclaimed phosphate mine with the most varied terrain and best mountain biking in Florida.", facts:[{icon:"🚵",text:"Over 20 miles of mountain bike trails wind through hilly reclaimed mine landscape."},{icon:"⛏️",text:"The park sits on former phosphate strip mines — reclamation created dramatic ridges and valleys."},{icon:"🦅",text:"Bald eagles nest in the park and are regularly spotted soaring overhead."},{icon:"🌿",text:"Scrub, flatwoods, and wetlands support an unusually wide range of wildlife."}]},
  { id:3, lat:30.5046, lng:-84.2652, name:"Alfred B. Maclay Gardens State Park", region:"Panhandle", county:"Leon", emoji:"🌺", color:"#9a3060", fact:"A stunning 1920s winter estate garden featuring over 170 varieties of camellias and azaleas.", facts:[{icon:"🌸",text:"Gardens peak January–April with spectacular camellias and azaleas."},{icon:"🏡",text:"The historic Maclay House (1909) is open for tours with original furnishings."},{icon:"🐢",text:"Lake Hall offers paddling, fishing, and Florida cooter turtles."},{icon:"🌿",text:"Over 800 ornamental plant species have been catalogued on the grounds."}]},
  { id:4, lat:30.5218, lng:-81.4468, name:"Amelia Island State Park", region:"Northeast Florida", county:"Nassau", emoji:"🐴", color:"#c4703a", fact:"The only Florida state park where you can ride horses on the beach.", facts:[{icon:"🐴",text:"Guided horseback rides on the beach — the only such experience at a Florida state park."},{icon:"🌊",text:"Sits at the southern tip of Amelia Island where Nassau Sound meets the Atlantic."},{icon:"🦀",text:"Ghost crabs, loggerhead turtle nests, and shorebird colonies line the shoreline."},{icon:"🏄",text:"Strong tidal currents create excellent fishing for red drum and flounder."}]},
  { id:5, lat:29.8982, lng:-81.2830, name:"Anastasia State Park", region:"Northeast Florida", county:"St. Johns", emoji:"🦎", color:"#c4703a", fact:"Ancient coquina rock formations and 4 miles of undeveloped Atlantic beach near St. Augustine.", facts:[{icon:"🏛️",text:"Coquina rock quarried here was used to build Castillo de San Marcos in the 1600s–1700s."},{icon:"🦎",text:"Gopher tortoises, Florida scrub lizards, and indigo snakes inhabit the scrub areas."},{icon:"🌊",text:"Salt Run lagoon is ideal for kayaking and paddleboarding."},{icon:"🐦",text:"A large colony of least terns and black skimmers nests on the beach each summer."}]},
  { id:6, lat:28.1825, lng:-82.7685, name:"Anclote Key Preserve State Park", region:"Central West Florida", county:"Pasco", emoji:"⚓", color:"#2d6e8a", fact:"A remote barrier island accessible only by boat, with a historic 1887 lighthouse.", facts:[{icon:"🏝️",text:"The island has no facilities — only nature trails, beach, and the historic Anclote Lighthouse."},{icon:"🦅",text:"Ospreys, bald eagles, and roseate spoonbills commonly nest or feed on the island."},{icon:"🐚",text:"Gulf-side beaches offer excellent shelling with lightning whelks and sand dollars."},{icon:"⛵",text:"Surrounding shallow grass flats are prime habitat for spotted sea trout."}]},
  { id:7, lat:27.0200, lng:-80.1875, name:"Atlantic Ridge Preserve State Park", region:"Southeast Florida", county:"Martin", emoji:"🌴", color:"#2d7a3a", fact:"A tropical wilderness protecting the headwaters of the St. Lucie River.", facts:[{icon:"🌿",text:"One of the last large undeveloped tracts in Martin County."},{icon:"🦋",text:"Florida's endangered Schaus' swallowtail butterfly has been documented here."},{icon:"🌊",text:"Protects headwaters flowing into the St. Lucie River and Indian River Lagoon."},{icon:"🐾",text:"Florida black bears, bobcats, and white-tailed deer roam the diverse habitats."}]},
  { id:8, lat:24.6627, lng:-81.2733, name:"Bahia Honda State Park", region:"Florida Keys", county:"Monroe", emoji:"🌴", color:"#1a8080", fact:"Consistently rated one of the best beaches in the US, with views of the old Bahia Honda Rail Bridge.", facts:[{icon:"🌉",text:"The 1912 Overseas Railroad bridge beside the park is iconic Florida Keys history."},{icon:"🐠",text:"The park sits atop a natural deep-water channel, excellent for snorkeling."},{icon:"🌴",text:"Rare silver palm trees — native only to the Florida Keys — grow here."},{icon:"🐦",text:"White-crowned pigeons and magnificent frigatebirds are regularly spotted."}]},
  { id:9, lat:29.9210, lng:-84.3536, name:"Bald Point State Park", region:"Panhandle", county:"Franklin", emoji:"🌬️", color:"#2d6e8a", fact:"A remote point at the confluence of Apalachee Bay and Ochlockonee Bay, famous for wind sports.", facts:[{icon:"🌊",text:"Water on three sides — Apalachee Bay, Ochlockonee Bay, and the Gulf."},{icon:"🏄",text:"One of the top kiteboarding and windsurfing spots in the Southeast."},{icon:"🦅",text:"Swallow-tailed kites pass through in large numbers during spring migration."},{icon:"🌿",text:"Rare coastal scrub habitat supports gopher tortoises and Eastern indigo snakes."}]},
  { id:10, lat:25.5280, lng:-80.2343, name:"Barnacle Historic State Park", region:"Southeast Florida", county:"Miami-Dade", emoji:"🏡", color:"#4a6741", fact:"Miami's oldest house (1891) on its original waterfront land in Coconut Grove.", facts:[{icon:"🏡",text:"Built in 1891 by Ralph Middleton Munroe — the oldest Miami-Dade home on its original site."},{icon:"⛵",text:"Munroe was a yacht designer; the home was built partly from salvaged shipwreck timber."},{icon:"🌊",text:"Grounds extend to Biscayne Bay — one of few public bayfront access points in Coconut Grove."},{icon:"🎵",text:"Monthly moonlight concerts continue a tradition of outdoor bayfront entertainment."}]},
  { id:11, lat:30.3594, lng:-87.0275, name:"Big Lagoon State Park", region:"Panhandle", county:"Escambia", emoji:"🌅", color:"#c4703a", fact:"Stunning sunset views over the Intracoastal Waterway and Big Lagoon, near Pensacola.", facts:[{icon:"🌅",text:"The observation tower offers some of the most spectacular sunset views on the Gulf Coast."},{icon:"🌊",text:"Big Lagoon is a sheltered estuary rich in fish, birds, and marine life."},{icon:"🦀",text:"Blue crabs, mullet, and redfish are abundant in the lagoon."},{icon:"🏕️",text:"Shaded campsites with electrical hookups make this a popular snowbird camping spot."}]},
  { id:12, lat:30.3452, lng:-82.7048, name:"Big Shoals State Park", region:"North Florida", county:"Hamilton", emoji:"🌊", color:"#1a5c7a", fact:"Home to Florida's largest whitewater rapids — a rare Class III stretch of the Suwannee River.", facts:[{icon:"🌊",text:"The Suwannee drops over limestone creating the only significant whitewater rapids in Florida."},{icon:"🛶",text:"Kayakers travel from across the state to run the Class III rapids in winter high water."},{icon:"🌿",text:"Beautiful riverside forest with towering sycamores lines the banks."},{icon:"🐾",text:"Black bears are frequently spotted in the park."}]},
  { id:13, lat:30.5293, lng:-81.5080, name:"Big Talbot Island State Park", region:"Northeast Florida", county:"Nassau/Duval", emoji:"🌊", color:"#4a7fa5", fact:"Famous for the Boneyard Beach — hauntingly beautiful bleached oak trees on the shoreline.", facts:[{icon:"🌿",text:"One of the largest undeveloped barrier islands on the Atlantic Coast."},{icon:"🦅",text:"A prime birding destination with over 200 recorded species including bald eagles."},{icon:"🎨",text:"Boneyard Beach is one of the most photographed natural landscapes in Florida."},{icon:"🦋",text:"Maritime shrub and tidal marsh support exceptional butterfly diversity."}]},
  { id:14, lat:25.6791, lng:-80.1618, name:"Bill Baggs Cape Florida State Park", region:"Southeast Florida", county:"Miami-Dade", emoji:"🔦", color:"#2d6e8a", fact:"Home to Miami's historic 1825 Cape Florida Lighthouse — the oldest structure in Miami-Dade County.", facts:[{icon:"🔦",text:"The 1825 Cape Florida Lighthouse is Miami-Dade's oldest structure — twice attacked and burned."},{icon:"🏝️",text:"The park occupies Key Biscayne's southern tip with views of Biscayne Bay and the Atlantic."},{icon:"🐢",text:"Loggerhead and green turtles nest on the park's beaches each summer."},{icon:"🚲",text:"A designated bike path and beach concessions make this Miami's most accessible escape."}]},
  { id:15, lat:30.5810, lng:-87.0338, name:"Blackwater Heritage State Trail", region:"Panhandle", county:"Santa Rosa", emoji:"🚴", color:"#4a6741", fact:"A 9.5-mile paved trail following a historic railroad corridor through longleaf pine forest.", facts:[{icon:"🚴",text:"Follows the old Whiting Field railroad corridor from Milton to the Naval Air Station."},{icon:"🌲",text:"Passes through longleaf pine flatwoods — one of the most threatened ecosystems in North America."},{icon:"🦋",text:"Wildflower blooms attract monarch butterflies and native pollinators."},{icon:"🏛️",text:"Passes through downtown Milton, one of the oldest towns in the Florida Panhandle."}]},
  { id:16, lat:30.7199, lng:-86.8896, name:"Blackwater River State Park", region:"Panhandle", county:"Santa Rosa", emoji:"🍂", color:"#8b5a1a", fact:"One of the purest sand-bottom blackwater rivers in the world, stained by tannins.", facts:[{icon:"🛶",text:"The Blackwater River is one of the premier canoe trails in the southeastern United States."},{icon:"🌿",text:"Ancient longleaf pine forests line the river corridor."},{icon:"💧",text:"The dark tea-colored water is actually extremely clean — acidity prevents bacterial growth."},{icon:"🦦",text:"River otters, wood ducks, and the rare Barbour's map turtle live along the river."}]},
  { id:17, lat:28.9505, lng:-81.3628, name:"Blue Spring State Park", region:"Central Florida", county:"Volusia", emoji:"🐬", color:"#1a7a9a", fact:"The most important winter manatee refuge in Florida and largest first-magnitude spring on the St. Johns River.", facts:[{icon:"🦭",text:"Hundreds of West Indian manatees gather in the 72°F spring run each winter."},{icon:"💧",text:"The spring pumps 100 million gallons of crystal-clear water per day into the St. Johns River."},{icon:"🤿",text:"Swimming and snorkeling are permitted in summer — visibility exceeds 100 feet."},{icon:"🏡",text:"The historic Thursby House (1872) gives a glimpse of steamboat-era St. Johns River life."}]},
  { id:18, lat:29.4630, lng:-81.1120, name:"Bulow Creek State Park", region:"Northeast Florida", county:"Flagler", emoji:"🌳", color:"#4a6741", fact:"Home to the Fairchild Oak, one of the largest and oldest live oak trees in the entire Southeast.", facts:[{icon:"🌳",text:"The Fairchild Oak is estimated to be over 2,000 years old with a 25-foot circumference."},{icon:"🚶",text:"The Bulow Woods Trail is one of the finest forest hikes in Florida."},{icon:"🌿",text:"Protects a rare and undisturbed example of North Florida's coastal hammock ecosystem."},{icon:"🐦",text:"Pileated woodpeckers, barred owls, and swallow-tailed kites are commonly spotted."}]},
  { id:19, lat:29.4782, lng:-81.1321, name:"Bulow Plantation Ruins Historic State Park", region:"Northeast Florida", county:"Flagler", emoji:"🏚️", color:"#7a5020", fact:"Haunting ruins of an 1820s sugar plantation destroyed by Seminole warriors in 1836.", facts:[{icon:"⚔️",text:"The plantation was burned by Seminole warriors in 1836 and the ruins remain largely untouched."},{icon:"🏭️",text:"The massive sugar mill ruins — boiler house and spring house — still stand in remarkable condition."},{icon:"🛶",text:"Bulow Creek offers excellent kayaking through a pristine blackwater tidal creek system."},{icon:"🌿",text:"Ruins are surrounded by ancient live oaks that have grown through the old stonework."}]},
  { id:20, lat:28.0348, lng:-82.7719, name:"Caladesi Island State Park", region:"Central West Florida", county:"Pinellas", emoji:"🏝️", color:"#1a8080", fact:"Consistently ranked among the top beaches in the USA, accessible only by ferry or private boat.", facts:[{icon:"🏝️",text:"Caladesi was connected to Honeymoon Island until a 1921 hurricane cut the two apart."},{icon:"🐚",text:"The Gulf-side beach is pristine with soft white quartz sand and excellent shelling."},{icon:"🦅",text:"Osprey, roseate spoonbills, and shorebirds nest throughout the salt marsh and mangroves."},{icon:"⛵",text:"The marina accommodates up to 100 boats — a popular anchorage destination."}]},
  { id:21, lat:26.6824, lng:-82.2673, name:"Cayo Costa State Park", region:"Southwest Florida", county:"Lee", emoji:"🏝️", color:"#c4703a", fact:"A pristine barrier island accessible only by boat — one of Florida's most unspoiled natural beaches.", facts:[{icon:"🐚",text:"Some of the best shelling beaches in all of Florida, rivaling nearby Sanibel Island."},{icon:"🦅",text:"Bald eagle nests and roseate spoonbills in tidal flats."},{icon:"🌊",text:"No roads, no bridges, no cars — only accessible via private boat or ferry from Pine Island."},{icon:"🦈",text:"Nurse sharks and rays are commonly spotted in the shallow Gulf-side waters."}]},
  { id:22, lat:29.9046, lng:-82.5702, name:"Cedar Key Museum State Park", region:"Nature Coast", county:"Levy", emoji:"🏛️", color:"#4a6741", fact:"Chronicles Cedar Key's history as once one of Florida's largest cities and the pencil-making capital.", facts:[{icon:"✏️",text:"Cedar Key was once the pencil capital of the USA — Eberhard Faber built a pencil factory here."},{icon:"🎣",text:"The cedar forests were clear-cut so rapidly the island's economy collapsed, leaving it isolated."},{icon:"🦅",text:"Today Cedar Key is a premier birding destination, especially during winter hawk migration."},{icon:"🎨",text:"The island is now known for its arts community and annual arts festival."}]},
  { id:23, lat:29.1600, lng:-82.6480, name:"Charlotte Harbor Preserve State Park", region:"Southwest Florida", county:"Charlotte/Sarasota/Lee", emoji:"🦩", color:"#2d7a4a", fact:"Florida's second largest state park — 50,000 acres of estuaries, mangroves, and pine flatwoods.", facts:[{icon:"🦩",text:"One of the most productive estuaries in Florida, with enormous flocks of roseate spoonbills."},{icon:"🐟",text:"Charlotte Harbor is a world-class sport fishing destination for tarpon, snook, and redfish."},{icon:"🌿",text:"One of the largest intact subtropical estuarine ecosystems in the US."},{icon:"🦅",text:"Bald eagle density is among the highest of any protected area in the southeastern US."}]},
  { id:24, lat:28.4000, lng:-82.0166, name:"Colt Creek State Park", region:"Central Florida", county:"Polk", emoji:"🌾", color:"#6b7a2a", fact:"A hidden gem in Polk County with some of Central Florida's best paddling, fishing, and equestrian trails.", facts:[{icon:"🛶",text:"A paddling trail winds through cypress-lined lakes — one of the most scenic paddles in Central Florida."},{icon:"🐎",text:"Dedicated equestrian trails and horse camping make Colt Creek popular with riders."},{icon:"🌾",text:"Vast dry prairies support sandhill cranes, crested caracaras, and Florida grasshopper sparrows."},{icon:"🦌",text:"White-tailed deer and wild turkey are commonly observed from the trails."}]},
  { id:25, lat:26.0870, lng:-81.6440, name:"Collier-Seminole State Park", region:"South Florida", county:"Collier", emoji:"🌿", color:"#1a5a2a", fact:"A gateway to the Ten Thousand Islands protecting rare mangrove estuary and royal palm hammock.", facts:[{icon:"🌿",text:"The park contains one of the few remaining stands of Florida royal palms in native hammock."},{icon:"🛶",text:"A 13-mile canoe trail loops through the Ten Thousand Islands — one of Florida's wildest paddles."},{icon:"🦩",text:"Wood storks, roseate spoonbills, and the rare snail kite can be observed in the wetlands."},{icon:"🏛️",text:"A restored Bay City Walking Dredge — used to build the Tamiami Trail — is on display."}]},
  { id:26, lat:30.4007, lng:-85.0357, name:"Constitution Convention Museum State Park", region:"Panhandle", county:"Calhoun", emoji:"📜", color:"#7a5020", fact:"Site where delegates met in 1838–39 to draft Florida's first constitution, paving the way for statehood.", facts:[{icon:"📜",text:"The 1838 Constitutional Convention produced the document allowing Florida statehood in 1845."},{icon:"🏛️",text:"The museum displays exhibits on Florida's territorial history and the convention delegates."},{icon:"🌊",text:"The park sits on the Apalachicola River — a critical freshwater artery flowing into the Gulf."},{icon:"🦅",text:"The Apalachicola River basin has more endemic species than any other river basin in North America."}]},
  { id:27, lat:29.1860, lng:-82.6980, name:"Crystal River Preserve State Park", region:"Nature Coast", county:"Citrus", emoji:"🦭", color:"#1a7a9a", fact:"Critical winter habitat for the West Indian manatee along the spring-fed Crystal River and Kings Bay.", facts:[{icon:"🦭",text:"Kings Bay hosts the largest concentration of manatees in North America during winter months."},{icon:"🤿",text:"Crystal River is one of only a few places where you can legally swim with manatees."},{icon:"💧",text:"Over 30 springs keep Kings Bay at a constant 72°F year-round."},{icon:"🌿",text:"The surrounding preserve protects tidal marshes and flatwoods critical for wading bird nesting."}]},
  { id:28, lat:26.4300, lng:-81.8350, name:"Delnor-Wiggins Pass State Park", region:"Southwest Florida", county:"Collier", emoji:"🌊", color:"#2d8aaa", fact:"One of Florida's most beautiful Gulf beaches, at the mouth of Wiggins Pass.", facts:[{icon:"🌊",text:"The park sits at the mouth of Wiggins Pass where the Cocohatchee River meets the Gulf."},{icon:"🐚",text:"The beach is famous for shelling with lightning whelks and sand dollars."},{icon:"🦅",text:"Osprey nest on channel markers in the pass, and bald eagles are frequently spotted."},{icon:"🐢",text:"Sea turtle monitoring is active here in summer with loggerhead nesting documented annually."}]},
  { id:29, lat:29.1365, lng:-81.3557, name:"De Leon Springs State Park", region:"Central Florida", county:"Volusia", emoji:"🥞", color:"#1a7a6a", fact:"A first-magnitude spring famous for its Old Sugar Mill restaurant where you cook your own pancakes.", facts:[{icon:"🥞",text:"The Old Spanish Sugar Mill lets diners cook their own pancakes at the table."},{icon:"💧",text:"The spring pumps 19 million gallons of 72°F water daily."},{icon:"🏛️",text:"Spanish explorers called this the 'Fountain of Youth' in the 16th century."},{icon:"🌿",text:"Ancient bald cypress trees ring the spring head, some estimated over 500 years old."}]},
  { id:30, lat:29.6716, lng:-82.2958, name:"Devil's Millhopper Geological State Park", region:"North Central Florida", county:"Alachua", emoji:"🕳️", color:"#4a3030", fact:"A dramatic 120-foot-deep geological sinkhole with its own microclimate, waterfalls, and prehistoric fossils.", facts:[{icon:"🕳️",text:"The sinkhole is 120 feet deep and 500 feet wide, formed when a limestone cavern roof collapsed."},{icon:"🌿",text:"The sinkhole's cool microclimate supports plant species normally found hundreds of miles north."},{icon:"🦷",text:"Prehistoric marine fossils including shark teeth and whale bones have been found in the walls."},{icon:"💧",text:"Several small waterfalls cascade down the walls after rainfall."}]},
  { id:31, lat:29.6474, lng:-82.5830, name:"Dudley Farm Historic State Park", region:"North Central Florida", county:"Alachua", emoji:"🐄", color:"#7a5020", fact:"A fully operational 1880s working farm where staff in period dress demonstrate authentic 19th-century farm life.", facts:[{icon:"🐄",text:"The farm has working cane mills, smokehouse, barns, and livestock — all authentic to the 1880s."},{icon:"🌽",text:"Costumed interpreters demonstrate corn shucking, syrup making, and blacksmithing."},{icon:"🏡",text:"The original Dudley family farmhouse and outbuildings have been preserved on the property."},{icon:"🌿",text:"The surrounding fields and woodlots have been restored to their historic agricultural landscape."}]},
  { id:32, lat:29.6450, lng:-81.7280, name:"Dunns Creek State Park", region:"Northeast Florida", county:"Putnam/St. Johns", emoji:"🛶", color:"#4a6741", fact:"A pristine blackwater creek cutting through ancient cypress forest — one of Northeast Florida's best paddles.", facts:[{icon:"🛶",text:"Dunns Creek is a designated Florida paddling trail through swamp and hammock."},{icon:"🌿",text:"Ancient bald cypress trees line the creek, some over 600 years old."},{icon:"🐊",text:"American alligators are abundant and frequently spotted sunning on the banks."},{icon:"🐦",text:"Wood ducks, limpkins, and anhingas are permanent residents of the swamp forest."}]},
  { id:33, lat:30.5034, lng:-86.3568, name:"Eden Gardens State Park", region:"Panhandle", county:"Walton", emoji:"🌸", color:"#9a3060", fact:"A stunning antebellum mansion surrounded by formal gardens and ancient live oaks along Choctawhatchee Bay.", facts:[{icon:"🏛️",text:"The Wesley House (1895) is one of the finest examples of antebellum architecture in the Panhandle."},{icon:"🌸",text:"Formal gardens feature camellias, azaleas, and Cherokee roses blooming in late winter."},{icon:"🌳",text:"Ancient live oaks with canopies spanning 100 feet shade the mansion grounds."},{icon:"🌊",text:"The park fronts Tucker Bayou, a tranquil arm of Choctawhatchee Bay."}]},
  { id:34, lat:30.0943, lng:-84.1557, name:"Edward Ball Wakulla Springs State Park", region:"Panhandle", county:"Wakulla", emoji:"🌀", color:"#1a5c7a", fact:"One of the world's deepest and largest freshwater springs, with a cave system extending 300+ feet down.", facts:[{icon:"🦣",text:"Mastodon bones and Ice Age animal remains have been found in the spring's depths."},{icon:"🎬",text:"The 1954 'Creature from the Black Lagoon' was filmed here in the spring."},{icon:"🦢",text:"Massive flocks of American coots winter here alongside herons, anhingas, and ibis."},{icon:"🏛️",text:"The historic 1937 Wakulla Springs Lodge still operates as a state park lodge."}]},
  { id:35, lat:28.7220, lng:-82.5960, name:"Ellie Schiller Homosassa Springs Wildlife State Park", region:"Nature Coast", county:"Citrus", emoji:"🦛", color:"#4a7fa5", fact:"A former roadside attraction best known for its resident manatees and 'Lu' the hippopotamus.", facts:[{icon:"🦛",text:"Lu the hippopotamus has lived at the park since 1964 and was granted honorary Florida citizenship."},{icon:"🦭",text:"Non-releasable manatees permanently reside in the spring run, visible from an underwater observatory."},{icon:"🐊",text:"Florida panthers, black bears, flamingos, and alligators are among the native wildlife."},{icon:"💧",text:"The Homosassa Spring is a first-magnitude spring pumping over 100 million gallons daily."}]},
  { id:36, lat:25.8770, lng:-81.5100, name:"Fakahatchee Strand Preserve State Park", region:"South Florida", county:"Collier", emoji:"🌺", color:"#2d7a3a", fact:"Florida's 'Amazon' — the largest stand of native royal palms and greatest concentration of rare orchids in North America.", facts:[{icon:"🌸",text:"Over 44 native orchid species grow here, including the ghost orchid, the rarest in North America."},{icon:"🐆",text:"Critical habitat for the Florida panther — one of the most endangered mammals in the US."},{icon:"🌴",text:"The native royal palm grove along Jane's Scenic Drive is unlike anywhere else in the US."},{icon:"🧪",text:"Scientists from around the world visit to study the biodiversity of this unique cypress strand."}]},
  { id:37, lat:30.7738, lng:-85.5817, name:"Falling Waters State Park", region:"Panhandle", county:"Washington", emoji:"💦", color:"#1a5c7a", fact:"Home to Florida's highest waterfall — a 73-foot cascade dropping into a cylindrical sinkhole pit.", facts:[{icon:"💦",text:"The 73-foot waterfall drops into a 100-foot-deep cylindrical sinkhole — the tallest waterfall in Florida."},{icon:"🕳️",text:"The origin of the stream that feeds the waterfall remains unknown — it disappears at the bottom."},{icon:"🌿",text:"The park sits on the red clay hills of the Panhandle, unlike the limestone karst typical elsewhere."},{icon:"🏕️",text:"A campground and swimming area make this a popular family destination."}]},
  { id:38, lat:29.5904, lng:-82.9480, name:"Fanning Springs State Park", region:"Nature Coast", county:"Gilchrist", emoji:"💧", color:"#1a7a6a", fact:"A crystal-clear first-magnitude spring on the Suwannee River, perfect for swimming and snorkeling.", facts:[{icon:"💧",text:"The spring discharges 65 million gallons of 68°F water per day into the Suwannee River."},{icon:"🤿",text:"Crystal-clear spring run with visibility extending to the limestone bottom."},{icon:"🦭",text:"Manatees frequently move into the spring run during cold winter weather."},{icon:"🌿",text:"A nature trail winds along the Suwannee River through gorgeous river swamp."}]},
  { id:39, lat:29.6520, lng:-82.3090, name:"Florida Caverns State Park", region:"Panhandle", county:"Jackson", emoji:"🦇", color:"#4a3030", fact:"The only Florida state park offering guided cave tours — spectacular stalactites and stalagmites.", facts:[{icon:"🦇",text:"The cave is home to southeastern myotis and tri-colored bats."},{icon:"🪨",text:"Stalactites, stalagmites, flowstone, and rimstone dams formed over millions of years."},{icon:"💧",text:"The adjacent Chipola River disappears underground at the Marianna Lowlands."},{icon:"🌿",text:"The above-ground park includes floodplain forest with excellent birding and camping."}]},
  { id:40, lat:30.7080, lng:-81.4462, name:"Fort Clinch State Park", region:"Northeast Florida", county:"Nassau", emoji:"🏰", color:"#4a6741", fact:"A well-preserved 19th-century brick fort on Amelia Island, used in both the Civil War and Spanish-American War.", facts:[{icon:"⚔️",text:"The fort was occupied by both Confederate and Union forces during the Civil War."},{icon:"🦀",text:"One of Florida's best surfing spots sits just outside the park at Amelia Island's north end."},{icon:"🐢",text:"Critical nesting habitat for loggerhead sea turtles every summer."},{icon:"🏕️",text:"Covers over 1,400 acres of maritime forest, beaches, and salt marshes."}]},
  { id:41, lat:28.5330, lng:-82.2430, name:"Fort Cooper State Park", region:"Nature Coast", county:"Citrus", emoji:"⚔️", color:"#7a5020", fact:"Site of a frontier fort and two Seminole War skirmishes in 1836, now offering spring swimming.", facts:[{icon:"⚔️",text:"Two significant battles between US Army troops and Seminole warriors took place here in March 1836."},{icon:"💧",text:"Lake Holathlikaha — fed by a small spring — offers unusually clear, cool swimming."},{icon:"🏛️",text:"Annual reenactments bring the Second Seminole War period to life with living history interpreters."},{icon:"🌿",text:"The trail system wanders through mixed hardwood forest with fine birding."}]},
  { id:42, lat:30.4830, lng:-81.4270, name:"Fort George Island Cultural State Park", region:"Northeast Florida", county:"Duval", emoji:"🏡", color:"#7a5020", fact:"Florida's oldest plantation site, with layers of history spanning Native American mounds and Spanish missions.", facts:[{icon:"🏛️",text:"The Kingsley Plantation (1798) is the oldest surviving plantation complex in Florida."},{icon:"🌿",text:"Fort George Island is a sea island with rich Timucuan archaeological history."},{icon:"🛶",text:"The Saturiwa Trail circles the island through salt marsh and maritime forest."},{icon:"🦅",text:"American oystercatchers, painted buntings, and bald eagles are notable bird species here."}]},
  { id:43, lat:29.9135, lng:-81.3093, name:"Fort Mose Historic State Park", region:"Northeast Florida", county:"St. Johns", emoji:"✊", color:"#2d2d8a", fact:"Site of the first legally sanctioned free Black community in what is now the United States, established in 1738.", facts:[{icon:"✊",text:"Fort Mose was established in 1738 by the Spanish as a militia fort manned by formerly enslaved people."},{icon:"🏛️",text:"A National Historic Landmark recognized as one of the most significant African-American heritage sites."},{icon:"🌿",text:"The original fort site is now underwater in a tidal marsh; the visitor center tells its story."},{icon:"🦅",text:"The surrounding marshlands attract an exceptional variety of wading birds and waterfowl."}]},
  { id:44, lat:27.4597, lng:-80.3213, name:"Fort Pierce Inlet State Park", region:"Treasure Coast", county:"St. Lucie", emoji:"🌊", color:"#2d6e8a", fact:"A wave-battered rocky shoreline and one of Florida's best surfing spots at the mouth of Fort Pierce Inlet.", facts:[{icon:"🏄",text:"Fort Pierce Inlet is one of the most consistent surf breaks on Florida's East Coast."},{icon:"🪸",text:"Coquina rock outcroppings support a rich intertidal community."},{icon:"🐢",text:"Loggerhead sea turtles nest at some of the highest densities recorded in Florida."},{icon:"🦅",text:"The inlet's fish-rich waters attract ospreys, pelicans, and cormorants year-round."}]},
  { id:45, lat:24.5487, lng:-81.8099, name:"Fort Zachary Taylor Historic State Park", region:"Florida Keys", county:"Monroe", emoji:"🏰", color:"#2d6e8a", fact:"A Civil War-era fort at the southernmost point of the continental US and Key West's best beach.", facts:[{icon:"🏰",text:"Fort Taylor was completed in 1866 and played a key role in the Union blockade of Confederate ports."},{icon:"⚓",text:"During restoration, the largest collection of Civil War cannons ever found was discovered bricked inside."},{icon:"🏖️",text:"The park's beach is widely considered the finest in Key West, with a natural reef offshore."},{icon:"🌊",text:"Snorkeling off the beach reveals elkhorn and staghorn coral along a shallow natural reef."}]},
  { id:46, lat:30.5140, lng:-86.5680, name:"Fred Gannon Rocky Bayou State Park", region:"Panhandle", county:"Okaloosa", emoji:"🌲", color:"#4a6741", fact:"A quiet Panhandle park on Niceville Bay with excellent fishing and old-growth longleaf pine.", facts:[{icon:"🌲",text:"The park contains some of the finest remaining longleaf pine stands in the Florida Panhandle."},{icon:"🎣",text:"Rocky Bayou is excellent for fishing — redfish, flounder, and speckled trout year-round."},{icon:"🛶",text:"A canoe trail winds through the bayou's tributaries in tannin-darkened water."},{icon:"🦅",text:"Ospreys and bald eagles nest in the park's tall pines overlooking the bayou."}]},
  { id:47, lat:29.3012, lng:-81.0570, name:"Gamble Rogers Memorial State Recreation Area", region:"Northeast Florida", county:"Flagler", emoji:"🎸", color:"#4a7fa5", fact:"A beachside park named for Florida folk singer Gamble Rogers, who drowned here saving a swimmer in 1991.", facts:[{icon:"🎸",text:"Gamble Rogers was a beloved Florida folk musician who died heroically saving a stranger."},{icon:"🌊",text:"The park sits on a barrier island offering both ocean and Intracoastal Waterway access."},{icon:"🏕️",text:"Beachside camping under palms makes this one of the most sought-after campsites on the East Coast."},{icon:"🐢",text:"Sea turtle nesting is active on the park's ocean beach throughout summer."}]},
  { id:48, lat:26.8544, lng:-82.2753, name:"Gasparilla Island State Park", region:"Southwest Florida", county:"Lee", emoji:"⚓", color:"#c4703a", fact:"A peaceful island park with the historic Port Boca Grande Lighthouse (1890) on Charlotte Harbor.", facts:[{icon:"⚓",text:"The lighthouse sits at the entrance to Charlotte Harbor — one of Florida's most scenic passes."},{icon:"🦅",text:"The island's Gulf beaches are excellent for shell collecting, especially after cold fronts."},{icon:"🏛️",text:"The historic Port Boca Grande Lighthouse is listed on the National Register of Historic Places."},{icon:"🎣",text:"The pass at the south end is world-famous for tarpon fishing in spring and early summer."}]},
  { id:49, lat:30.3151, lng:-86.1759, name:"Grayton Beach State Park", region:"Panhandle", county:"Walton", emoji:"🏖️", color:"#2d8aaa", fact:"Consistently ranked among America's best beaches, with iconic emerald Gulf water and sugar-white sand.", facts:[{icon:"🏖️",text:"Grayton Beach is regularly voted one of the top beaches in the United States."},{icon:"💧",text:"Western Lake — a rare coastal dune lake — sits just behind the dunes."},{icon:"🌿",text:"Coastal dune lakes like Western Lake are found in only a handful of places globally."},{icon:"🦎",text:"The endangered Gulf Coast diamondback terrapin nests along the park's brackish shoreline."}]},
  { id:50, lat:30.3832, lng:-86.4770, name:"Henderson Beach State Park", region:"Panhandle", county:"Okaloosa", emoji:"🏖️", color:"#2d8aaa", fact:"Classic Emerald Coast beach park in Destin with pristine white sand and emerald Gulf waters.", facts:[{icon:"🏖️",text:"Classic Destin combination: brilliant white quartz sand and vivid emerald-green water."},{icon:"🐢",text:"Sea turtle nesting is monitored on the beach each summer."},{icon:"🌿",text:"Coastal scrub forest behind the dunes provides habitat for gopher tortoises."},{icon:"🌅",text:"The park offers some of the finest Gulf sunsets on the Florida Panhandle coast."}]},
  { id:51, lat:27.4748, lng:-81.5430, name:"Highland Hammock State Park", region:"Central Florida", county:"Highlands", emoji:"🌿", color:"#2d6a2a", fact:"One of Florida's original four state parks (1938), protecting ancient cypress trees and rare Florida scrub.", facts:[{icon:"🌿",text:"One of the first four state parks opened in Florida in 1931 — a CCC project."},{icon:"🐊",text:"The park's ancient cypress swamp is one of the finest examples of this vanishing habitat."},{icon:"🌲",text:"Some of the ancient oaks and cypresses are estimated to be over 1,000 years old."},{icon:"🐎",text:"Tram tours through the hammock are offered on weekends."}]},
  { id:52, lat:28.1430, lng:-82.2330, name:"Hillsborough River State Park", region:"Central Florida", county:"Hillsborough", emoji:"🏰", color:"#4a6741", fact:"Florida's oldest continuously operating state park (1938), featuring Class II rapids on the Hillsborough River.", facts:[{icon:"🏰",text:"The reconstructed Fort Foster is a Second Seminole War-era fort with annual living history events."},{icon:"🌊",text:"The Hillsborough River's natural Class II rapids are among the few visible rocky shoals in peninsular Florida."},{icon:"🌿",text:"Ancient live oak hammocks and cypress swamps just 30 minutes from Tampa."},{icon:"🐊",text:"Florida softshell turtles, river otters, and alligators are regularly observed along the river."}]},
  { id:53, lat:28.9020, lng:-81.3630, name:"Hontoon Island State Park", region:"Central Florida", county:"Volusia", emoji:"🏝️", color:"#4a6741", fact:"A river island accessible only by ferry, with ancient Timucuan shell mounds and old-growth hammock.", facts:[{icon:"🏛️",text:"Timucuan shell mounds on the island date back over 2,000 years."},{icon:"🌿",text:"The island's interior is dominated by magnificent live oak hammock."},{icon:"🛶",text:"The surrounding St. Johns River offers exceptional fishing for largemouth bass."},{icon:"🦅",text:"Bald eagles nest on the island and swallow-tailed kites are seen during spring migration."}]},
  { id:54, lat:28.0520, lng:-82.8280, name:"Honeymoon Island State Park", region:"Central West Florida", county:"Pinellas", emoji:"🌅", color:"#c4703a", fact:"One of Florida's most popular state parks, with pristine beaches and one of the Gulf Coast's largest osprey colonies.", facts:[{icon:"🦅",text:"Honeymoon Island hosts one of the largest concentrations of nesting ospreys on the US Gulf Coast."},{icon:"🌅",text:"Sunset views overlook the Gulf of Mexico and Caladesi Island in the distance."},{icon:"⛵",text:"A ferry service from the park takes visitors to the pristine Caladesi Island."},{icon:"🐚",text:"Wide Gulf-side beach with excellent shelling and swimming."}]},
  { id:55, lat:26.1224, lng:-80.1003, name:"Hugh Taylor Birch State Park", region:"Southeast Florida", county:"Broward", emoji:"🌿", color:"#2d7a3a", fact:"An urban oasis in Fort Lauderdale protecting one of the last maritime hammocks on the southeast Florida coast.", facts:[{icon:"🌿",text:"A surprising urban refuge protecting rare maritime hammock amid dense Fort Lauderdale development."},{icon:"🏛️",text:"Named for Hugh Taylor Birch, who donated his estate to ensure it would never be developed."},{icon:"🚴",text:"A 1.7-mile bike and pedestrian path circles a lagoon through the hammock."},{icon:"🐢",text:"Gopher tortoises still live in the scrub sections — remarkable for an urban Florida park."}]},
  { id:56, lat:29.9887, lng:-82.7637, name:"Ichetucknee Springs State Park", region:"North Central Florida", county:"Columbia/Suwannee", emoji:"🌊", color:"#1a7a6a", fact:"A spring-fed river beloved across Florida for tubing — 9 crystal-clear springs feed a 6-mile paradise.", facts:[{icon:"🌊",text:"Over 230 million gallons of 68°F water bubble up from 9 springs to form the Ichetucknee River daily."},{icon:"🛶",text:"Floating the 6-mile river on a tube is one of Florida's most iconic summer traditions."},{icon:"🐢",text:"Ichetucknee cooter turtles — endemic to this river system — live nowhere else on Earth."},{icon:"🌿",text:"The river corridor is in near-pristine condition — no development disturbs the spring run."}]},
  { id:57, lat:24.8789, lng:-80.6637, name:"Indian Key Historic State Park", region:"Florida Keys", county:"Monroe", emoji:"🏚️", color:"#7a5020", fact:"Ruins of a once-thriving 1830s town on a tiny Keys island, destroyed in a Seminole War raid in 1840.", facts:[{icon:"⚔️",text:"Indian Key was a prosperous wrecking town before Seminoles attacked and destroyed it in August 1840."},{icon:"🌿",text:"The island is now entirely overgrown with ruins beneath dense tropical vegetation."},{icon:"⛵",text:"Only accessible by private boat or kayak — no ferry service."},{icon:"🌺",text:"Dr. Henry Perrine, a botanist growing tropical plants here, was killed in the 1840 raid."}]},
  { id:58, lat:26.8369, lng:-80.0555, name:"John D. MacArthur Beach State Park", region:"Southeast Florida", county:"Palm Beach", emoji:"🌊", color:"#2d8aaa", fact:"One of the last undeveloped stretches of natural beach in Palm Beach County, with a pristine lagoon boardwalk.", facts:[{icon:"🌊",text:"A 1,600-foot boardwalk crosses Lake Worth Cove lagoon to reach the Atlantic beach."},{icon:"🪸",text:"A natural reef just offshore makes this one of Palm Beach County's best snorkeling spots."},{icon:"🐢",text:"Loggerhead, leatherback, and green sea turtles all nest on the park's beach each summer."},{icon:"🌿",text:"Protects one of the last examples of tropical coastal hammock in the Palm Beach area."}]},
  { id:59, lat:29.8951, lng:-84.9991, name:"John Gorrie Museum State Park", region:"Panhandle", county:"Franklin", emoji:"❄️", color:"#2d6e8a", fact:"Museum honoring Dr. John Gorrie, the inventor of mechanical refrigeration and ice-making in 1851.", facts:[{icon:"❄️",text:"Dr. Gorrie invented the first ice-making machine in 1851 to cool fever patients — the forerunner of all air conditioning."},{icon:"🏛️",text:"His original 1851 patent model is on display — a pilgrimage site for HVAC history buffs."},{icon:"🌊",text:"Apalachicola was once the third-busiest port in the Gulf of Mexico."},{icon:"🦪",text:"The Apalachicola Bay nearby produces a significant portion of Florida's wild-caught oysters."}]},
  { id:60, lat:25.1237, lng:-80.3022, name:"John Pennekamp Coral Reef State Park", region:"Florida Keys", county:"Monroe", emoji:"🪸", color:"#1a8080", fact:"The first underwater state park in the United States, protecting part of the only living coral reef system in the continental US.", facts:[{icon:"🪸",text:"The park protects 70 nautical square miles of coral reefs, seagrass beds, and mangrove swamps."},{icon:"⛵",text:"Glass-bottom boat tours have operated here since the park's founding in 1963."},{icon:"🐠",text:"Over 600 species of fish and 55 species of coral have been recorded in the park's waters."},{icon:"✝️",text:"The iconic 'Christ of the Abyss' bronze statue stands on the ocean floor at 25 feet."}]},
  { id:61, lat:27.0280, lng:-80.0880, name:"Jonathan Dickinson State Park", region:"Treasure Coast", county:"Martin", emoji:"🦅", color:"#4a6741", fact:"Southeast Florida's largest state park, protecting the pristine Loxahatchee River and rare Florida scrub-jay habitat.", facts:[{icon:"🦅",text:"The largest protected area of Florida scrub-jay habitat in the southeastern United States."},{icon:"🌊",text:"The Loxahatchee River is the only federally designated Wild and Scenic River in Florida."},{icon:"🛶",text:"Boat tours up the Loxahatchee River are one of the most popular nature experiences in South Florida."},{icon:"🐊",text:"Alligators, river otters, and West Indian manatees are regularly observed."}]},
  { id:62, lat:27.5000, lng:-81.1500, name:"Kissimmee Prairie Preserve State Park", region:"Central Florida", county:"Okeechobee", emoji:"🌾", color:"#9ab08d", fact:"Florida's largest dry prairie — one of the rarest and most threatened ecosystems in the world.", facts:[{icon:"🌾",text:"54,000 acres of dry prairie — a globally rare ecosystem nearly eliminated from Florida."},{icon:"🦅",text:"Florida grasshopper sparrows and crested caracaras nest in the prairie."},{icon:"⭐",text:"Remote location and no light pollution make this one of the top stargazing spots in the Southeast."},{icon:"🐎",text:"Horseback riding is permitted on over 100 miles of trails."}]},
  { id:63, lat:26.4380, lng:-81.8520, name:"Koreshan State Park", region:"Southwest Florida", county:"Lee", emoji:"🔭", color:"#4a6741", fact:"Historic site of the Koreshan Unity — a utopian settlement founded on the belief humans live inside a hollow Earth.", facts:[{icon:"🔭",text:"Cyrus Teed founded the Koreshan Unity here in 1894, believing the universe exists inside a hollow sphere."},{icon:"🌿",text:"The group planted extensive gardens and built 10 structures, several still standing."},{icon:"🛶",text:"The Estero River is one of Southwest Florida's most scenic paddle routes."},{icon:"🦋",text:"The historic gardens attract an extraordinary number of butterflies and native pollinators."}]},
  { id:64, lat:29.9990, lng:-83.1950, name:"Lafayette Blue Springs State Park", region:"North Florida", county:"Lafayette", emoji:"💧", color:"#1a7a6a", fact:"A pristine, remote first-magnitude spring on the Suwannee River with crystal-clear water.", facts:[{icon:"💧",text:"Lafayette Blue Spring — visibility often exceeds 150 feet, one of Florida's clearest springs."},{icon:"🦭",text:"Manatees regularly use the spring as a warm-water refuge during winter cold spells."},{icon:"🤿",text:"Snorkeling and cave diving attract enthusiasts from across the country."},{icon:"🌿",text:"The surrounding floodplain forest along the Suwannee River is near-pristine."}]},
  { id:65, lat:28.9590, lng:-81.9090, name:"Lake Griffin State Park", region:"Central Florida", county:"Lake", emoji:"🐦", color:"#4a7fa5", fact:"A park centered on Lake Griffin, one of the most productive bass fishing lakes in Florida.", facts:[{icon:"🎣",text:"Lake Griffin is part of the Ocklawaha chain of lakes, known for trophy largemouth bass."},{icon:"🐦",text:"The largest colony of American anhingas in Florida historically nested in the park's cypress trees."},{icon:"🌿",text:"Ancient live oak hammock along the lake shore shelters one of Florida's largest live oaks."},{icon:"🛶",text:"Canoe and kayak rentals available on the scenic cypress-and-lily-pad lake."}]},
  { id:66, lat:27.3450, lng:-81.3850, name:"Lake Kissimmee State Park", region:"Central Florida", county:"Polk", emoji:"🐄", color:"#6b7a2a", fact:"A living history 1876 cow camp and one of Central Florida's most important wildlife preserves.", facts:[{icon:"🐄",text:"The Cow Camp living history program recreates the life of Florida 'Cow Hunters.'"},{icon:"🦅",text:"One of the best places to see bald eagles, sandhill cranes, and Florida crested caracaras."},{icon:"🌾",text:"Dry prairie habitat supports many of Florida's rarest grassland birds."},{icon:"🛶",text:"Three large lakes — Kissimmee, Tiger, and Rosalie — offer excellent fishing and paddling."}]},
  { id:67, lat:28.3930, lng:-81.7380, name:"Lake Louisa State Park", region:"Central Florida", county:"Lake", emoji:"🌊", color:"#4a7fa5", fact:"A chain of 13 spring-fed lakes in the heart of the Green Swamp with excellent paddling and fishing.", facts:[{icon:"🌊",text:"Encompasses 13 spring-fed lakes connected by the Palatlakaha River in the Green Swamp watershed."},{icon:"🛶",text:"Paddling between the lakes through cypress swamps is one of Central Florida's most rewarding water trails."},{icon:"🐎",text:"Extensive equestrian trail system loops through the park's flatwoods and scrub."},{icon:"🌿",text:"The park lies within the Green Swamp, a critical water recharge area for Central Florida."}]},
  { id:68, lat:27.4630, lng:-82.5040, name:"Lake Manatee State Park", region:"Central West Florida", county:"Manatee", emoji:"🦭", color:"#2d6e8a", fact:"A peaceful park along the Manatee River with swimming, boating, and excellent fishing.", facts:[{icon:"🦭",text:"West Indian manatees are frequently observed in the Manatee River adjacent to the park."},{icon:"🎣",text:"The park offers boat ramp access to Lake Manatee and the upper Manatee River."},{icon:"🌿",text:"A nature trail winds through sandhill habitat with gopher tortoises and longleaf pine."},{icon:"🏊",text:"One of the last natural river swimming spots near Tampa."}]},
  { id:69, lat:30.4280, lng:-84.6730, name:"Lake Talquin State Park", region:"Panhandle", county:"Gadsden/Leon", emoji:"🎣", color:"#4a6741", fact:"A beloved Panhandle fishing destination on Lake Talquin, created by damming the Ochlockonee River in 1928.", facts:[{icon:"🎣",text:"Lake Talquin is a premier destination for largemouth bass, crappie, and catfish."},{icon:"🌿",text:"Ancient bluffs along the Ochlockonee River support rare mesic slope forest communities."},{icon:"🦅",text:"Bald eagles nest in the park's tall pines and commonly seen hunting over the lake."},{icon:"🛶",text:"Flatwoods and creek paddling are popular with locals seeking a quiet getaway."}]},
  { id:70, lat:29.1180, lng:-82.0740, name:"Marjorie Kinnan Rawlings Historic State Park", region:"North Central Florida", county:"Alachua", emoji:"📚", color:"#7a5020", fact:"The preserved 1930s farmstead where Pulitzer Prize winner Marjorie Kinnan Rawlings wrote 'The Yearling.'", facts:[{icon:"📚",text:"Rawlings wrote her Pulitzer Prize-winning novel 'The Yearling' at this rural homestead in Cross Creek."},{icon:"🏡",text:"The cracker-style farmhouse is furnished as it was in Rawlings' time, with her typewriter on the desk."},{icon:"🌿",text:"Surrounding citrus groves, barn, and chicken yard give a sense of 1930s Florida farm life."},{icon:"🦩",text:"Sandhill cranes, herons, and limpkins inhabit the adjacent wetlands."}]},
  { id:71, lat:29.8680, lng:-81.9640, name:"Mike Roess Gold Head Branch State Park", region:"Northeast Florida", county:"Clay", emoji:"🌊", color:"#4a6741", fact:"A picturesque spring-fed ravine and lake in the rolling hills of Clay County.", facts:[{icon:"🌊",text:"Gold Head Branch is a small stream fed by seeps that carved a distinctive ravine through red clay hills."},{icon:"🌿",text:"The ravine supports plant species unusual for Florida, typical of more northern states."},{icon:"🏛️",text:"CCC-built structures from the 1930s including the historic lodge and cabins are still in use."},{icon:"🎣",text:"Lake Johnson and Lake Sheeler offer fishing for largemouth bass and chain pickerel."}]},
  { id:72, lat:26.3210, lng:-81.7190, name:"Mound Key Archaeological State Park", region:"Southwest Florida", county:"Lee", emoji:"🏛️", color:"#7a5020", fact:"A shell mound island accessible only by water — the likely site of the Calusa Indian capital Calos.", facts:[{icon:"🏛️",text:"The island's massive shell mounds are the largest human-made shell mounds in the US."},{icon:"⛵",text:"Only accessible by paddling or boating through Estero Bay Aquatic Preserve."},{icon:"🐚",text:"The Calusa people built this island entirely from shell refuse over 2,000 years of habitation."},{icon:"🌿",text:"Mangroves and tropical hammock now cover the mounds in a mysterious landscape."}]},
  { id:73, lat:27.3928, lng:-82.4477, name:"Myakka River State Park", region:"Southwest Florida", county:"Sarasota", emoji:"🐊", color:"#6b7a2a", fact:"One of Florida's oldest and largest state parks — 37,000 acres of prairies, hammocks, and wetlands.", facts:[{icon:"🐊",text:"Hosts one of the densest concentrations of American alligators anywhere in the United States."},{icon:"🌿",text:"The upper Myakka canopy walkway at 25 feet high is one of the first canopy walks in the nation."},{icon:"🦅",text:"Over 200 bird species recorded, making it one of Florida's top birding destinations."},{icon:"🌾",text:"Dry prairie habitat supports sandhill cranes and crested caracaras."}]},
  { id:74, lat:30.3230, lng:-84.2340, name:"Natural Bridge Battlefield Historic State Park", region:"Panhandle", county:"Leon", emoji:"⚔️", color:"#7a5020", fact:"Site of the last significant Confederate victory east of the Mississippi River on March 6, 1865.", facts:[{icon:"⚔️",text:"Confederate forces including teenage cadets repelled a Union attack here."},{icon:"🌊",text:"The St. Marks River disappears underground and reappears at a 'natural bridge' — the battle's namesake."},{icon:"🏛️",text:"Annual reenactments each March draw large crowds."},{icon:"🌿",text:"The park's river hammock is lush with magnolias, beeches, and rare limestone-associated plants."}]},
  { id:75, lat:28.9700, lng:-82.1260, name:"Ocala National Forest (Salt Springs Unit)", region:"North Central Florida", county:"Marion", emoji:"🌲", color:"#3d6632", fact:"The southernmost national forest in the US and home to the world's largest longleaf pine scrub.", facts:[{icon:"🏊",text:"Juniper, Alexander, and Salt Springs offer some of the finest natural swimming in Florida."},{icon:"🦌",text:"The largest population of Florida black bears in the state lives within the forest."},{icon:"🌵",text:"Florida scrub-jays — found nowhere else on Earth — nest in the scrub habitat."},{icon:"🛤️",text:"Over 600 miles of trails including a major section of the Florida Trail."}]},
  { id:76, lat:28.8960, lng:-82.1530, name:"Rainbow Springs State Park", region:"Nature Coast", county:"Marion", emoji:"🌈", color:"#1a7a6a", fact:"A breathtaking first-magnitude spring with tubing, snorkeling, and a historic 1930s botanical garden.", facts:[{icon:"🌈",text:"Rainbow Springs ranks among the four largest springs in Florida, pumping 400–600 million gallons daily."},{icon:"🏡",text:"Waterfalls, exotic plant gardens, and cabins were part of a mid-20th century tourist attraction."},{icon:"🤿",text:"Visibility in the spring run often exceeds 100 feet — one of the clearest waters in the Americas."},{icon:"🦭",text:"Manatees and Florida spotted gar are commonly observed in the crystalline run."}]},
  { id:77, lat:29.6448, lng:-81.6327, name:"Ravine Gardens State Park", region:"Northeast Florida", county:"Putnam", emoji:"🌸", color:"#7a4a8a", fact:"A breathtaking natural ravine carved by ancient springs, filled with thousands of azaleas blooming each spring.", facts:[{icon:"🌸",text:"Over 100,000 azalea plants line the ravine slopes, drawing crowds during the annual Azalea Festival."},{icon:"💧",text:"Twin ravines carved by spring-fed streams cutting 120 feet deep into the Florida plateau."},{icon:"🏛️",text:"Built by the Civilian Conservation Corps (CCC) in the 1930s as a Great Depression relief project."},{icon:"🌿",text:"A suspension bridge spans the ravine with a dramatic view of the fern-covered slopes below."}]},
  { id:78, lat:28.7350, lng:-81.4270, name:"Rock Springs Run State Reserve", region:"Central Florida", county:"Orange/Lake", emoji:"🏞️", color:"#1a7a6a", fact:"Protects the pristine headwaters of Rock Springs Run, one of Florida's finest tubing and kayaking rivers.", facts:[{icon:"🏞️",text:"Rock Springs Run is a tributary of the Wekiva River — both flow through protected land."},{icon:"🤿",text:"Crystal-clear spring water supports excellent snorkeling, with manatees visiting in winter."},{icon:"🌿",text:"Over 13,000 acres of longleaf pine, scrub, and swamp forest."},{icon:"🦅",text:"Swallow-tailed kites, bald eagles, and sandhill cranes all nest within the reserve."}]},
  { id:79, lat:30.5270, lng:-86.4070, name:"Rocky Bayou State Park", region:"Panhandle", county:"Okaloosa", emoji:"🌲", color:"#4a6741", fact:"A quiet Panhandle park on Rocky Bayou with excellent fishing, swimming, and longleaf pine scenery.", facts:[{icon:"🌲",text:"The park contains beautiful longleaf pine flatwoods with native wiregrass."},{icon:"🎣",text:"Rocky Bayou offers excellent fishing for flounder, redfish, and speckled trout year-round."},{icon:"🏊",text:"A freshwater swimming area provides a refreshing alternative to Gulf beach crowds."},{icon:"🛶",text:"Kayakers and canoeists explore the bayou's tributary creeks."}]},
  { id:80, lat:27.3400, lng:-80.3580, name:"Savannas Preserve State Park", region:"Treasure Coast", county:"St. Lucie/Martin/Indian River", emoji:"🌾", color:"#9ab08d", fact:"Protects the largest freshwater coastal savanna in the US between the Atlantic and the mainland.", facts:[{icon:"🌾",text:"The largest freshwater coastal savanna ecosystem in the contiguous United States."},{icon:"🦋",text:"The rare Atala butterfly, once thought extinct, has been successfully reintroduced."},{icon:"🌿",text:"Pitcher plants, sundews, and carnivorous plants thrive in the nutrient-poor wet savannas."},{icon:"🦩",text:"Roseate spoonbills, white ibis, and wood storks forage in the shallow savanna wetlands."}]},
  { id:81, lat:27.8621, lng:-80.4486, name:"Sebastian Inlet State Park", region:"Treasure Coast", county:"Indian River/Brevard", emoji:"🏄", color:"#2d6e8a", fact:"One of Florida's most popular surf spots and where legendary surfers Kelly Slater and the Hobgood twins learned to surf.", facts:[{icon:"🏄",text:"Sebastian Inlet is the birthplace of professional surfers Kelly Slater, CJ and Damien Hobgood."},{icon:"🐟",text:"Consistently rated the top surf fishing spot in the Southeast for large redfish and bluefish."},{icon:"🏛️",text:"The McLarty Treasure Museum tells the story of the 1715 Spanish treasure fleet wrecked nearby."},{icon:"🐢",text:"The park has one of the highest documented sea turtle nesting densities in Florida."}]},
  { id:82, lat:29.2010, lng:-82.0530, name:"Silver River State Park", region:"North Central Florida", county:"Marion", emoji:"🐒", color:"#1a7a6a", fact:"Florida's clearest river, home to wild rhesus monkeys brought for a 1930s Tarzan movie that never left.", facts:[{icon:"🐒",text:"A colony of wild rhesus macaques has lived along the Silver River since escaping a Tarzan movie set in 1938."},{icon:"💧",text:"The Silver River carries 550 million gallons of crystal-clear 72°F spring water daily."},{icon:"🎬",text:"Multiple Tarzan films, James Bond movies, and TV shows were filmed in these waters."},{icon:"🌿",text:"The park museum tells the story of the Silver River's remarkable natural and human history."}]},
  { id:83, lat:29.2185, lng:-82.0565, name:"Silver Springs State Park", region:"North Central Florida", county:"Marion", emoji:"🐟", color:"#1a7a6a", fact:"The world's largest artesian spring formation — legendary glass-bottom boats have operated here since 1878.", facts:[{icon:"🎬",text:"Scenes from 6 Tarzan films, multiple James Bond movies, and many TV shows were filmed here."},{icon:"🐒",text:"Wild rhesus macaques live in the park — descendants of monkeys from a 1938 Tarzan movie."},{icon:"💧",text:"Over 550 million gallons of crystal-clear 72°F water bubble up from the aquifer daily."},{icon:"🏆",text:"Listed as a National Natural Landmark and historically the most-visited spring in the world."}]},
  { id:84, lat:30.0659, lng:-85.7143, name:"St. Andrews State Park", region:"Panhandle", county:"Bay", emoji:"⚓", color:"#2d8aaa", fact:"Classic Emerald Coast beach park in Panama City Beach with some of the Panhandle's finest Gulf waters.", facts:[{icon:"⚓",text:"The park occupies a peninsula at the entrance to St. Andrews Bay — historically strategic."},{icon:"🏖️",text:"White quartz sand and emerald water beaches ranked among the best in the US."},{icon:"🦈",text:"A small jetty at the inlet offers snorkeling over limestone ledges teeming with reef fish."},{icon:"🐢",text:"Sea turtle nesting is monitored throughout the summer."}]},
  { id:85, lat:29.6640, lng:-85.4030, name:"St. Joseph Peninsula State Park", region:"Panhandle", county:"Gulf", emoji:"🦅", color:"#2d8aaa", fact:"A remote sand spit jutting into the Gulf — one of Florida's wildest beaches and a world-class raptor migration point.", facts:[{icon:"🦅",text:"Up to 100,000 raptors including thousands of peregrine falcons funnel down this peninsula each fall."},{icon:"🏖️",text:"The tip of the peninsula has miles of white sand beaches with no roads or development."},{icon:"🐢",text:"Loggerhead sea turtle nesting density is among the highest in the Florida Panhandle."},{icon:"⛺",text:"Primitive tent camping at the tip offers one of Florida's wildest camping experiences."}]},
  { id:86, lat:27.1945, lng:-80.1643, name:"St. Lucie Inlet Preserve State Park", region:"Treasure Coast", county:"Martin", emoji:"🌊", color:"#2d6e8a", fact:"An undeveloped barrier island accessible only by boat, with coral outcroppings and excellent snorkeling.", facts:[{icon:"🪸",text:"Caloosa Cove reef is one of the northernmost living coral communities on the US East Coast."},{icon:"⛵",text:"Only accessible by private boat — no ferry or bridge — pristine and uncrowded."},{icon:"🐢",text:"One of the highest documented loggerhead sea turtle nesting densities in the state."},{icon:"🌿",text:"Rare coastal strand and hammock habitat with gopher tortoises."}]},
  { id:87, lat:30.0753, lng:-84.1790, name:"St. Marks National Wildlife Refuge", region:"Panhandle", county:"Wakulla", emoji:"🦢", color:"#2d6e8a", fact:"One of the oldest refuges in the US, established in 1931, protecting critical Gulf Coast wetlands.", facts:[{icon:"🦋",text:"An important waypoint on the monarch butterfly migration — thousands pass through in fall."},{icon:"🏛️",text:"The historic St. Marks Lighthouse (1831) still stands inside the refuge."},{icon:"🦅",text:"Over 300 bird species have been recorded here — a world-class birding destination."},{icon:"🐊",text:"One of the few places in Florida where you can see both alligators and American crocodiles."}]},
  { id:88, lat:27.7891, lng:-80.4635, name:"Sebastian Inlet (north unit)", region:"Treasure Coast", county:"Brevard", emoji:"🌊", color:"#2d6e8a", fact:"The north unit of Sebastian Inlet State Park with beach access and Archie Carr sea turtle nesting beaches.", facts:[{icon:"🐢",text:"This stretch of beach has some of the highest sea turtle nesting densities in the Western Hemisphere."},{icon:"🌊",text:"Atlantic waves break over natural coquina ledges creating excellent surfing conditions."},{icon:"🌿",text:"Coastal scrub behind the beach harbors gopher tortoises and native dune plants."},{icon:"🦅",text:"Peregrine falcons and merlins hunt along the shoreline during fall migration."}]},
